openapi: 3.0.1
info:
  title: 設備権限管理 API
  description: 更新されたデータベース構造に基づく設備権限管理APIインターフェースドキュメント
  version: 2.0.0
tags:
  - name: 設備権限管理
  - name: 権限IP管理
  - name: 権限設備情報管理
  - name: DevicePermissions
  - name: PermissionIPs
  - name: PermissionDevices
paths:
  /device-permissions:
    get:
      summary: 設備権限リストを取得
      deprecated: false
      description: 設備権限のページングリストを取得、複数の検索条件をサポート
      operationId: getDevicePermissions
      tags:
        - 設備権限管理
        - DevicePermissions
      parameters:
        - name: page
          in: query
          description: ページ番号、1から開始
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: ページあたりの数
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: job_number
          in: query
          description: 社員番号（あいまい検索）
          required: false
          schema:
            type: string
        - name: computer_name
          in: query
          description: コンピュータ名（あいまい検索）
          required: false
          schema:
            type: string
        - name: login_username
          in: query
          description: ログインユーザ名（あいまい検索）
          required: false
          schema:
            type: string
        - name: domain_status_id
          in: query
          description: ドメインステータスID
          required: false
          schema:
            type: integer
        - name: usb_status_id
          in: query
          description: USBステータスID
          required: false
          schema:
            type: integer
        - name: smartit_status_id
          in: query
          description: SmartITステータスID
          required: false
          schema:
            type: integer
        - name: antivirus_status_id
          in: query
          description: ウイルス対策ステータスID
          required: false
          schema:
            type: integer
        - name: is_deleted
          in: query
          description: 論理削除フラグ（0=未削除、1=削除済）
          required: false
          schema:
            type: integer
            default: 0
            enum:
              - 0
              - 1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePermissionListResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
    post:
      summary: 設備権限を作成
      deprecated: false
      description: 新しい設備権限レコードを作成
      operationId: createDevicePermission
      tags:
        - 設備権限管理
        - DevicePermissions
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDevicePermissionRequest'
            examples:
              basic:
                value:
                  permission_id: PERM_DEV003
                  job_number: EMP003
                  computer_name: PC-LENOVO-003
                  login_username: wangwu
                  domain_status_id: 7
                summary: 基本権限作成
        required: true
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePermissionResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '409':
          description: 権限IDが既に存在します
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
  /device-permissions/{permission_id}:
    get:
      summary: 設備権限詳細を取得
      deprecated: false
      description: 権限IDに基づいて設備権限詳細を取得、関連するIPと設備情報を含む
      operationId: getDevicePermissionById
      tags:
        - 設備権限管理
        - DevicePermissions
      parameters:
        - name: permission_id
          in: path
          description: 権限番号
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePermissionDetailResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
    put:
      summary: 設備権限を更新
      deprecated: false
      description: 設備権限情報を更新
      operationId: updateDevicePermission
      tags:
        - 設備権限管理
        - DevicePermissions
      parameters:
        - name: permission_id
          in: path
          description: 権限番号
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDevicePermissionRequest'
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePermissionResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
    delete:
      summary: 設備権限を削除
      deprecated: false
      description: 設備権限を論理削除（is_deleted=1を設定）
      operationId: deleteDevicePermission
      tags:
        - 設備権限管理
        - DevicePermissions
      parameters:
        - name: permission_id
          in: path
          description: 権限番号
          required: true
          example: ''
          schema:
            type: string
      responses:
        '204':
          description: 削除成功
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
  /device-permissions/batch-delete:
    post:
      summary: 設備権限を一括削除
      deprecated: false
      description: 設備権限を一括論理削除
      operationId: batchDeleteDevicePermissions
      tags:
        - 設備権限管理
        - DevicePermissions
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                permission_ids:
                  type: array
                  items:
                    type: string
                  description: 権限IDリスト
              required:
                - permission_ids
        required: true
      responses:
        '200':
          description: 一括削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success_count:
                    type: integer
                    description: 削除成功数
                  fail_count:
                    type: integer
                    description: 削除失敗数
                  failed_items:
                    type: array
                    items:
                      type: object
                      properties:
                        permission_id:
                          type: string
                        reason:
                          type: string
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
  /device-permissions/{permission_id}/ips:
    get:
      summary: 設備権限のすべてのIPを取得
      deprecated: false
      description: 指定された設備権限下のすべてのIPアドレスを取得
      operationId: getPermissionIPsByPermissionId
      tags:
        - 設備権限管理
        - DevicePermissions
      parameters:
        - name: permission_id
          in: path
          description: 権限番号
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  permission_id:
                    type: string
                    description: 権限ID
                  computer_name:
                    type: string
                    description: コンピュータ名
                  login_username:
                    type: string
                    description: ログインユーザ名
                  ips:
                    type: array
                    items:
                      $ref: '#/components/schemas/PermissionIP'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
  /device-permissions/{permission_id}/devices:
    get:
      summary: 設備権限のすべての設備情報を取得
      deprecated: false
      description: 指定された設備権限下のすべての設備情報を取得
      operationId: getPermissionDevicesByPermissionId
      tags:
        - 設備権限管理
        - DevicePermissions
      parameters:
        - name: permission_id
          in: path
          description: 権限番号
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  permission_id:
                    type: string
                    description: 権限ID
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/PermissionDevice'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
  /permission-ips:
    get:
      summary: 権限IPリストを取得
      deprecated: false
      description: 権限IPのページングリストを取得、複数の検索条件をサポート
      operationId: getPermissionIPs
      tags:
        - 権限IP管理
        - PermissionIPs
      parameters:
        - name: page
          in: query
          description: ページ番号、1から開始
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: ページあたりの数
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: permission_id
          in: query
          description: 権限番号
          required: false
          schema:
            type: string
        - name: ip_address
          in: query
          description: IPアドレス（あいまい検索）
          required: false
          schema:
            type: string
        - name: is_deleted
          in: query
          description: 論理削除フラグ
          required: false
          schema:
            type: integer
            default: 0
            enum:
              - 0
              - 1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionIPListResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
    post:
      summary: 権限IPを作成
      deprecated: false
      description: 権限に新しいIPレコードを作成
      operationId: createPermissionIP
      tags:
        - 権限IP管理
        - PermissionIPs
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermissionIPRequest'
        required: true
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionIPResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '409':
          description: IPアドレスが既に存在します
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
  /permission-ips/{ip_id}:
    get:
      summary: 権限IP詳細を取得
      deprecated: false
      description: IP IDに基づいて権限IP詳細を取得
      operationId: getPermissionIPById
      tags:
        - 権限IP管理
        - PermissionIPs
      parameters:
        - name: ip_id
          in: path
          description: IP番号
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionIPDetailResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
    put:
      summary: 権限IPを更新
      deprecated: false
      description: 権限IP情報を更新
      operationId: updatePermissionIP
      tags:
        - 権限IP管理
        - PermissionIPs
      parameters:
        - name: ip_id
          in: path
          description: IP番号
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionIPRequest'
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionIPResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
    delete:
      summary: 権限IPを削除
      deprecated: false
      description: 権限IPを論理削除（is_deleted=1を設定）
      operationId: deletePermissionIP
      tags:
        - 権限IP管理
        - PermissionIPs
      parameters:
        - name: ip_id
          in: path
          description: IP番号
          required: true
          example: ''
          schema:
            type: string
      responses:
        '204':
          description: 削除成功
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
  /permission-devices:
    get:
      summary: 権限設備情報リストを取得
      deprecated: false
      description: 権限設備情報のページングリストを取得（注意：device_idはdevice_infoテーブルと無関係）
      operationId: getPermissionDevices
      tags:
        - 権限設備情報管理
        - PermissionDevices
      parameters:
        - name: page
          in: query
          description: ページ番号、1から開始
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: ページあたりの数
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: permission_id
          in: query
          description: 権限番号（外部キー）
          required: false
          schema:
            type: string
        - name: device_id
          in: query
          description: 設備番号（主キー、permission_device_infoテーブル）
          required: false
          schema:
            type: string
        - name: is_deleted
          in: query
          description: 論理削除フラグ
          required: false
          schema:
            type: integer
            default: 0
            enum:
              - 0
              - 1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeviceListResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
    post:
      summary: 設備情報権限関連を作成
      deprecated: false
      description: 設備情報と権限の関連レコードを作成（注意：device_idはdevice_infoテーブルと無関係）
      operationId: createPermissionDevice
      tags:
        - 権限設備情報管理
        - PermissionDevices
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermissionDeviceRequest'
        required: true
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeviceResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '409':
          description: 設備IDが既に関連付けられています
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
  /permission-devices/{device_id}:
    get:
      summary: 権限設備情報詳細を取得
      deprecated: false
      description: 設備IDに基づいて権限設備関連詳細を取得（注意：device_idはdevice_infoテーブルと無関係）
      operationId: getPermissionDeviceById
      tags:
        - 権限設備情報管理
        - PermissionDevices
      parameters:
        - name: device_id
          in: path
          description: 設備番号（主キー、permission_device_infoテーブル）
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeviceDetailResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
    put:
      summary: 権限設備情報を更新
      deprecated: false
      description: 設備と権限の関連情報を更新
      operationId: updatePermissionDevice
      tags:
        - 権限設備情報管理
        - PermissionDevices
      parameters:
        - name: device_id
          in: path
          description: 設備番号（主キー、permission_device_infoテーブル）
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionDeviceRequest'
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeviceResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータエラー
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未認証アクセス
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが存在しません
        '500':
          $ref: '#/components/responses/InternalServerError'
          description: サーバー内部エラー
      security:
        - BearerAuth1: []
        - ApiKeyAuth: []
    delete:
      summary: 権限設備情報を削除
      deprecated: false
      description: 権限設備関連を論理削除（is_deleted=1を設定）
      operationId: deletePermissionDevice
      tags:
        - 権限設備情報管理
        - PermissionDevices
      parameters:
        - name: device_id
          in: path
