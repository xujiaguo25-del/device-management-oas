openapi: 3.0.1
info:
  title: 辞書管理API
  description: 辞書タイプと辞書項目の管理API
  version: 4.0.0
tags:
  - name: 辞書タイプ管理
  - name: 辞書項目管理
paths:
  /dict/types:
    get:
      summary: 辞書タイプ一覧の取得
      deprecated: false
      description: ページネーションによる辞書タイプ情報の検索
      tags:
        - 辞書タイプ管理
      parameters:
        - name: page
          in: query
          description: ページ番号
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: ページあたりの件数
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: dict_type_code
          in: query
          description: 辞書タイプコードによるフィルタ
          required: false
          schema:
            type: string
        - name: dict_type_name
          in: query
          description: 辞書タイプ名によるフィルタ
          required: false
          schema:
            type: string
        - name: is_enabled
          in: query
          description: 有効フラグによるフィルタ（0=無効、1=有効）
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
      responses:
        '200':
          description: 辞書タイプ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  page_info:
                    $ref: '#/components/schemas/PageInfo'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DictTypeListDTO'
          headers: {}
      security:
        - BearerAuth: []
    post:
      summary: 辞書タイプの作成
      deprecated: false
      description: 新しい辞書タイプの作成
      tags:
        - 辞書タイプ管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDictTypeDTO'
        required: true
      responses:
        '201':
          description: 辞書タイプ作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictTypeDetailDTO'
          headers: {}
      security:
        - BearerAuth: []
  /dict/types/all:
    get:
      summary: 全ての辞書タイプの取得
      deprecated: false
      description: ページネーションなしで全ての有効な辞書タイプを取得（選択肢用）
      tags:
        - 辞書タイプ管理
      parameters: []
      responses:
        '200':
          description: 辞書タイプ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DictTypeSimpleDTO'
          headers: {}
      security:
        - BearerAuth: []
  /dict/types/{dict_type_id}:
    get:
      summary: 辞書タイプ詳細の取得
      deprecated: false
      description: 辞書タイプIDによる詳細情報の取得
      tags:
        - 辞書タイプ管理
      parameters:
        - name: dict_type_id
          in: path
          description: 辞書タイプID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 辞書タイプ詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictTypeDetailDTO'
          headers: {}
      security:
        - BearerAuth: []
    put:
      summary: 辞書タイプ情報の更新
      deprecated: false
      description: 辞書タイプ基本情報の更新
      tags:
        - 辞書タイプ管理
      parameters:
        - name: dict_type_id
          in: path
          description: 辞書タイプID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDictTypeDTO'
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictTypeDetailDTO'
          headers: {}
      security:
        - BearerAuth: []
    delete:
      summary: 辞書タイプの削除（論理削除）
      deprecated: false
      description: ''
      tags:
        - 辞書タイプ管理
      parameters:
        - name: dict_type_id
          in: path
          description: 辞書タイプID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 削除成功
          headers: {}
      security:
        - BearerAuth: []
  /dict/types/{dict_type_id}/enable:
    put:
      summary: 辞書タイプの有効化/無効化
      deprecated: false
      description: 辞書タイプの有効状態を切り替え
      tags:
        - 辞書タイプ管理
      parameters:
        - name: dict_type_id
          in: path
          description: 辞書タイプID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - is_enabled
              properties:
                is_enabled:
                  type: integer
                  enum:
                    - 0
                    - 1
                  description: 有効フラグ（0=無効、1=有効）
        required: true
      responses:
        '200':
          description: 状態更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictTypeDetailDTO'
          headers: {}
      security:
        - BearerAuth: []
  /dict/items:
    get:
      summary: 辞書項目一覧の取得
      deprecated: false
      description: ページネーションによる辞書項目情報の検索
      tags:
        - 辞書項目管理
      parameters:
        - name: page
          in: query
          description: ページ番号
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: ページあたりの件数
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: dict_type_id
          in: query
          description: 辞書タイプIDによるフィルタ
          required: false
          schema:
            type: integer
            format: int64
        - name: dict_type_code
          in: query
          description: 辞書タイプコードによるフィルタ
          required: false
          schema:
            type: string
        - name: dict_item_code
          in: query
          description: 辞書項目コードによるフィルタ
          required: false
          schema:
            type: string
        - name: dict_item_name
          in: query
          description: 辞書項目名によるフィルタ
          required: false
          schema:
            type: string
        - name: is_enabled
          in: query
          description: 有効フラグによるフィルタ（0=無効、1=有効）
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
      responses:
        '200':
          description: 辞書項目一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  page_info:
                    $ref: '#/components/schemas/PageInfo'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DictItemListDTO'
          headers: {}
      security:
        - BearerAuth: []
    post:
      summary: 辞書項目の作成
      deprecated: false
      description: 新しい辞書項目の作成
      tags:
        - 辞書項目管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDictItemDTO'
        required: true
      responses:
        '201':
          description: 辞書項目作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictItemDetailDTO'
          headers: {}
      security:
        - BearerAuth: []
  /dict/items/by-type/{dict_type_code}:
    get:
      summary: 辞書タイプコードによる辞書項目一覧の取得
      deprecated: false
      description: 辞書タイプコードに基づいて有効な辞書項目を全て取得（選択肢用）
      tags:
        - 辞書項目管理
      parameters:
        - name: dict_type_code
          in: path
          description: 辞書タイプコード
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: 辞書項目一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DictItemSimpleDTO'
          headers: {}
      security:
        - BearerAuth: []
  /dict/items/{dict_item_id}:
    get:
      summary: 辞書項目詳細の取得
      deprecated: false
      description: 辞書項目IDによる詳細情報の取得
      tags:
        - 辞書項目管理
      parameters:
        - name: dict_item_id
          in: path
          description: 辞書項目ID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 辞書項目詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictItemDetailDTO'
          headers: {}
      security:
        - BearerAuth: []
    put:
      summary: 辞書項目情報の更新
      deprecated: false
      description: 辞書項目基本情報の更新
      tags:
        - 辞書項目管理
      parameters:
        - name: dict_item_id
          in: path
          description: 辞書項目ID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDictItemDTO'
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictItemDetailDTO'
          headers: {}
      security:
        - BearerAuth: []
    delete:
      summary: 辞書項目の削除（論理削除）
      deprecated: false
      description: ''
      tags:
        - 辞書項目管理
      parameters:
        - name: dict_item_id
          in: path
          description: 辞書項目ID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 削除成功
          headers: {}
      security:
        - BearerAuth: []
  /dict/items/{dict_item_id}/enable:
    put:
      summary: 辞書項目の有効化/無効化
      deprecated: false
      description: 辞書項目の有効状態を切り替え
      tags:
        - 辞書項目管理
      parameters:
        - name: dict_item_id
          in: path
          description: 辞書項目ID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - is_enabled
              properties:
                is_enabled:
                  type: integer
                  enum:
                    - 0
                    - 1
                  description: 有効フラグ（0=無効、1=有効）
        required: true
      responses:
        '200':
          description: 状態更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictItemDetailDTO'
          headers: {}
      security:
        - BearerAuth: []
  /dict/items/{dict_item_id}/sort:
    put:
      summary: 辞書項目のソート順更新
      deprecated: false
      description: 辞書項目の表示順序を更新
      tags:
        - 辞書項目管理
      parameters:
        - name: dict_item_id
          in: path
          description: 辞書項目ID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - sort
              properties:
                sort:
                  type: integer
                  description: ソート番号
        required: true
      responses:
        '200':
          description: ソート順更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictItemDetailDTO'
          headers: {}
      security:
        - BearerAuth: []
  /dict/items/batch/enable:
    put:
      summary: 辞書項目の一括有効化/無効化
      deprecated: false
      description: 複数の辞書項目の有効状態を一括切り替え
      tags:
        - 辞書項目管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - dict_item_ids
                - is_enabled
              properties:
                dict_item_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
                  description: 辞書項目ID一覧
                is_enabled:
                  type: integer
                  enum:
                    - 0
                    - 1
                  description: 有効フラグ（0=無効、1=有効）
        required: true
      responses:
        '200':
          description: 一括状態更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success_count:
                    type: integer
                  fail_count:
                    type: integer
          headers: {}
      security:
        - BearerAuth: []
components:
  schemas:
    DictTypeSimpleDTO:
      type: object
      properties:
        dict_type_id:
          type: integer
          format: int64
          example: 1
        dict_type_code:
          type: string
          example: USER_TYPE
        dict_type_name:
          type: string
          example: ユーザータイプ
    DictTypeListDTO:
      allOf:
        - $ref: '#/components/schemas/DictTypeSimpleDTO'
        - type: object
          properties:
            description:
              type: string
              nullable: true
              example: 異なるタイプのユーザーを区別
            is_enabled:
              type: integer
              example: 1
            create_time:
              type: string
              format: date-time
            update_time:
              type: string
              format: date-time
    DictTypeDetailDTO:
      allOf:
        - $ref: '#/components/schemas/DictTypeListDTO'
        - type: object
          properties:
            is_deleted:
              type: integer
              example: 0
            item_count:
              type: integer
              example: 2
    CreateDictTypeDTO:
      type: object
      required:
        - dict_type_code
        - dict_type_name
      properties:
        dict_type_code:
          type: string
          description: 辞書タイプコード（ユニーク）
          example: USER_TYPE
        dict_type_name:
          type: string
          description: 辞書タイプ名
          example: ユーザータイプ
        description:
          type: string
          description: 辞書タイプの説明
          nullable: true
          example: 異なるタイプのユーザーを区別
        is_enabled:
          type: integer
          enum:
            - 0
            - 1
          default: 1
          description: 有効フラグ（0=無効、1=有効）
    UpdateDictTypeDTO:
      type: object
      properties:
        dict_type_name:
          type: string
          description: 辞書タイプ名
          example: ユーザータイプ
        description:
          type: string
          description: 辞書タイプの説明
          nullable: true
          example: 異なるタイプのユーザーを区別
    DictItemSimpleDTO:
      type: object
      properties:
        dict_item_id:
          type: integer
          format: int64
          example: 1
        dict_item_code:
          type: string
          example: ADMIN
        dict_item_name:
          type: string
          example: 管理者
        sort:
          type: integer
          example: 1
    DictItemListDTO:
      allOf:
        - $ref: '#/components/schemas/DictItemSimpleDTO'
        - type: object
          properties:
            dict_type_id:
              type: integer
              format: int64
              example: 1
            dict_type_code:
              type: string
              example: USER_TYPE
            dict_type_name:
              type: string
              example: ユーザータイプ
            is_enabled:
              type: integer
              example: 1
            create_time:
              type: string
              format: date-time
            update_time:
              type: string
              format: date-time
    DictItemDetailDTO:
      allOf:
        - $ref: '#/components/schemas/DictItemListDTO'
        - type: object
          properties:
            is_deleted:
              type: integer
              example: 0
    CreateDictItemDTO:
      type: object
      required:
        - dict_type_id
        - dict_item_code
        - dict_item_name
      properties:
        dict_type_id:
          type: integer
          format: int64
          description: 辞書タイプID
          example: 1
        dict_item_code:
          type: string
          description: 辞書項目コード（同一タイプ内ユニーク）
          example: ADMIN
        dict_item_name:
          type: string
          description: 辞書項目名
          example: 管理者
        sort:
          type: integer
          default: 0
          description: ソート番号
        is_enabled:
          type: integer
          enum:
            - 0
            - 1
          default: 1
          description: 有効フラグ（0=無効、1=有効）
    UpdateDictItemDTO:
      type: object
      properties:
        dict_item_name:
          type: string
          description: 辞書項目名
          example: 管理者
        sort:
          type: integer
          description: ソート番号
    PageInfo:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
    Error1:
      type: object
      properties:
        code:
          type: integer
          example: 404
        message:
          type: string
          example: 用户不存在
        timestamp:
          type: string
          format: date-time
          example: '2024-01-20T10:30:00.000Z'
  responses:
    UnauthorizedError:
      description: 认证失败或令牌无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error1'
          examples:
            成功示例:
              summary: 成功示例
              value:
                code: 401
                message: 无效的访问令牌
                timestamp: '2024-01-20T10:30:00Z'
    NotFoundError:
      description: 请求的资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error1'
          examples:
            成功示例:
              summary: 成功示例
              value:
                code: 404
                message: 资源不存在
                timestamp: '2024-01-20T10:30:00Z'
    BadRequest:
      description: リクエストパラメータエラー
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 400
              message:
                type: string
                example: リクエストパラメータエラー
              errors:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    message:
                      type: string
    Unauthorized:
      description: 未認証アクセス
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 401
              message:
                type: string
                example: 未認証アクセス
    Forbidden:
      description: アクセス禁止
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 403
              message:
                type: string
                example: アクセス禁止
    NotFound:
      description: リソースが存在しません
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 404
              message:
                type: string
                example: リソースが存在しません
    Conflict:
      description: リソース競合
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 409
              message:
                type: string
                example: リソースが既に存在します
    InternalServerError:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 500
              message:
                type: string
                example: サーバー内部エラー
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers: []
security: []
