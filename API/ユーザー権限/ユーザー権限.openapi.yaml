openapi: 3.0.1
info:
  title: ユーザー権限
  description: ユーザーログイン、アクセストークン管理、ロール・権限管理のCRUD機能を含むAPI
  version: 1.0.0
tags:
  - name: ログイン
  - name: ' ユーザー管理'
  - name: ロール管理
  - name: 権限管理
  - name: アクセス権管理
  - name: ロール-アクセス権連携管理
  - name: ユーザー-ロール連携管理
  - name: ユーザー-アクセス権連携管理
paths:
  /auth/login:
    post:
      summary: ユーザーログイン
      deprecated: false
      description: 社員番号とパスワードでログインし、トークンを取得
      tags:
        - ログイン
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              jobNumber: EMP001
              password: password123
              rememberMe: true
        required: true
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ログイン成功
                data:
                  accessToken: >-
                    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsImpvYk51bWJlciI6IkVNUDgwMSIsIm5hbWUiOiLnlLXopoHvvIgifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
                  refreshToken: >-
                    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsImpvYk51bWJlciI6IkVNUDgwMSIsIm5hbWUiOiLnlLXopoHvvIgifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
                  tokenType: Bearer
                  expiresIn: 7200
                  userInfo:
                    userId: 1
                    jobNumber: EMP001
                    name: 张三
                    deptId: DEPT001
                    roleName: システム管理者
                    permissions:
                      - PERM_VIEW_USER
                      - PERM_EDIT_USER
                      - PERM_VIEW_DEVICE
                timestamp: 1735584000000
          headers: {}
        '401':
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 401
                message: 社員番号またはパスワードが不正です
                data: null
                timestamp: 1735584000000
          headers: {}
      security: []
  /auth/logout:
    post:
      summary: ユーザーログアウト
      deprecated: false
      description: トークンを無効化し、ログイン状態を解除
      tags:
        - ログイン
      parameters: []
      responses:
        '200':
          description: ログアウト成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ログアウト成功
                data: null
                timestamp: 1735587600000
          headers: {}
      security:
        - bearerAuth1: []
  /auth/refresh-token:
    post:
      summary: トークンリフレッシュ
      deprecated: false
      description: リフレッシュトークンで新しいアクセストークンを取得
      tags:
        - ログイン
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  example: >-
                    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsImpvYk51bWJlciI6IkVNUDgwMSIsIm5hbWUiOiLnlLXopoHvvIgifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
        required: true
      responses:
        '200':
          description: トークンリフレッシュ成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: トークンリフレッシュ成功
                data:
                  accessToken: >-
                    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsImpvYk51bWJlciI6IkVNUDgwMSIsIm5hbWUiOiLnlLXopoHvvIgifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
                  tokenType: Bearer
                  expiresIn: 7200
                timestamp: 1735587600000
          headers: {}
      security: []
  /user:
    post:
      summary: ユーザー作成
      deprecated: false
      description: 新規ユーザーを作成（システム管理者権限 required）
      tags:
        - ' ユーザー管理'
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
            example:
              jobNumber: EMP003
              name: 劉七
              deptId: DEPT003
              password: P@ssw0rd
              roleId: 2
              userTypeId: 2
        required: true
      responses:
        '200':
          description: ユーザー作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ユーザー作成成功
                data:
                  userId: 3
                  jobNumber: EMP003
                  name: 劉七
                timestamp: 1735588800000
          headers: {}
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 403
                message: ユーザー作成権限がありません
                data: null
                timestamp: 1735588800000
          headers: {}
      security:
        - bearerAuth1: []
  /user/list:
    get:
      summary: ユーザー一覧取得
      deprecated: false
      description: ユーザー一覧を取得（論理削除済は含まない）
      tags:
        - ' ユーザー管理'
      parameters:
        - name: deptId
          in: query
          description: 部署番号で絞り込み
          required: false
          example: DEPT001
          schema:
            type: string
        - name: roleId
          in: query
          description: ロールIDで絞り込み
          required: false
          example: 1
          schema:
            type: integer
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  totalCount: 2
                  userList:
                    - userId: 1
                      jobNumber: EMP001
                      name: 张三
                      deptId: DEPT001
                      roleName: システム管理者
                      userTypeName: 管理者
                      isDeleted: false
                      createTime: '2025-12-30T00:01:57.000Z'
                      updateTime: '2025-12-30T00:01:57.000Z'
                    - userId: 2
                      jobNumber: EMP002
                      name: 李四
                      deptId: DEPT002
                      roleName: 一般ユーザー
                      userTypeName: 一般ユーザー
                      isDeleted: false
                      createTime: '2025-12-30T00:01:57.000Z'
                      updateTime: '2025-12-30T00:01:57.000Z'
                timestamp: 1735589400000
          headers: {}
      security:
        - bearerAuth1: []
  /user/{userId}:
    get:
      summary: ユーザー詳細取得
      deprecated: false
      description: ユーザーIDで詳細情報を取得
      tags:
        - ' ユーザー管理'
      parameters:
        - name: userId
          in: path
          description: ''
          required: true
          example: 1
          schema:
            type: integer
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  userId: 1
                  jobNumber: EMP001
                  name: 张三
                  deptId: DEPT001
                  roleName: システム管理者
                  userTypeName: 管理者
                  permissions:
                    - PERM_VIEW_USER
                    - PERM_EDIT_USER
                    - PERM_VIEW_DEVICE
                  isDeleted: false
                  createTime: '2025-12-30T00:01:57.000Z'
                  updateTime: '2025-12-30T00:01:57.000Z'
                timestamp: 1735589400000
          headers: {}
      security:
        - bearerAuth1: []
    put:
      summary: ユーザー情報更新
      deprecated: false
      description: ユーザーIDで情報を更新
      tags:
        - ' ユーザー管理'
      parameters:
        - name: userId
          in: path
          description: ''
          required: true
          example: 2
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            example:
              name: 李四郎
              deptId: DEPT002
              roleId: 1
              userTypeId: 1
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 更新成功
                data:
                  userId: 2
                  updateTime: '2025-12-30T17:00:00.000Z'
                timestamp: 1735590000000
          headers: {}
      security:
        - bearerAuth1: []
    delete:
      summary: ユーザー論理削除
      deprecated: false
      description: ユーザーIDで論理削除（is_deleted=true）
      tags:
        - ' ユーザー管理'
      parameters:
        - name: userId
          in: path
          description: ''
          required: true
          example: 3
          schema:
            type: integer
      responses:
        '200':
          description: 論理削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ユーザー論理削除成功
                data:
                  userId: 3
                  isDeleted: true
                timestamp: 1735590600000
          headers: {}
      security:
        - bearerAuth1: []
  /role:
    post:
      summary: ロール作成
      deprecated: false
      description: 新規ロールを作成（システム管理者権限 required）
      tags:
        - ロール管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateRequest'
            example:
              roleName: 点検管理者
              roleCode: ROLE_INSPECTION_ADMIN
              description: 点検レポートの全権限を保有
        required: true
      responses:
        '200':
          description: ロール作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ロール作成成功
                data:
                  roleId: 3
                  roleName: 点検管理者
                  roleCode: ROLE_INSPECTION_ADMIN
                timestamp: 1735591200000
          headers: {}
      security:
        - bearerAuth1: []
  /role/list:
    get:
      summary: ロール一覧取得
      deprecated: false
      description: ロール一覧を取得（論理削除済は含まない）
      tags:
        - ロール管理
      parameters: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  totalCount: 3
                  roleList:
                    - roleId: 1
                      roleName: システム管理者
                      roleCode: ROLE_ADMIN
                      description: システムの全権限を保有
                      isDeleted: false
                      createTime: '2025-12-30T00:01:57.000Z'
                    - roleId: 2
                      roleName: 一般ユーザー
                      roleCode: ROLE_USER
                      description: 一般ユーザーの権限を保有
                      isDeleted: false
                      createTime: '2025-12-30T00:01:57.000Z'
                    - roleId: 3
                      roleName: 点検管理者
                      roleCode: ROLE_INSPECTION_ADMIN
                      description: 点検レポートの全権限を保有
                      isDeleted: false
                      createTime: '2025-12-30T17:20:00.000Z'
                timestamp: 1735591800000
          headers: {}
      security:
        - bearerAuth1: []
  /role/{roleId}:
    get:
      summary: ロール詳細取得
      deprecated: false
      description: ロールIDで詳細情報と紐付く権限を取得
      tags:
        - ロール管理
      parameters:
        - name: roleId
          in: path
          description: ''
          required: true
          example: 3
          schema:
            type: integer
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  roleId: 3
                  roleName: 点検管理者
                  roleCode: ROLE_INSPECTION_ADMIN
                  description: 点検レポートの全権限を保有
                  permissions:
                    - permissionId: 3
                      permissionName: 機器参照
                      permissionCode: PERM_VIEW_DEVICE
                    - permissionId: 4
                      permissionName: レポート承認
                      permissionCode: PERM_APPROVE_REPORT
                isDeleted: false
                createTime: '2025-12-30T17:20:00.000Z'
                timestamp: 1735591800000
          headers: {}
      security:
        - bearerAuth1: []
    put:
      summary: ロール情報更新
      deprecated: false
      description: ロールIDで情報を更新
      tags:
        - ロール管理
      parameters:
        - name: roleId
          in: path
          description: ''
          required: true
          example: 3
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdateRequest'
            example:
              roleName: 点検管理責任者
              description: 点検レポートの作成・承認権限を保有
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ロール更新成功
                data:
                  roleId: 3
                  updateTime: '2025-12-30T17:30:00.000Z'
                timestamp: 1735592400000
          headers: {}
      security:
        - bearerAuth1: []
    delete:
      summary: ロール論理削除
      deprecated: false
      description: ロールIDで論理削除（is_deleted=true）
      tags:
        - ロール管理
      parameters:
        - name: roleId
          in: path
          description: ''
          required: true
          example: 3
          schema:
            type: integer
      responses:
        '200':
          description: 論理削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ロール論理削除成功
                data:
                  roleId: 3
                  isDeleted: true
                timestamp: 1735593000000
          headers: {}
      security:
        - bearerAuth1: []
  /role/permission/bind:
    post:
      summary: ロール-権限紐付け
      deprecated: false
      description: ロールに権限を紐付け（既存紐付けは上書き）
      tags:
        - ロール管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolePermissionBindRequest'
            example:
              roleId: 3
              permissionIds:
                - 3
                - 4
                - 5
        required: true
      responses:
        '200':
          description: 紐付け成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ロール-権限紐付け成功
                data:
                  roleId: 3
                  permissionIds:
                    - 3
                    - 4
                    - 5
                timestamp: 1735593600000
          headers: {}
      security:
        - bearerAuth1: []
  /roles:
    get:
      summary: ロール一覧取得
      deprecated: false
      description: ロールの一覧をページング検索します
      tags:
        - ロール管理
      parameters:
        - name: page
          in: query
          description: ページ番号
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          description: 1ページあたりの件数
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: keyword
          in: query
          description: 検索キーワード
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          total:
                            type: integer
                            description: 総件数
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Role'
                    type: object
          headers: {}
        '400':
          description: リクエストパラメータ不正
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
    post:
      summary: ロール新規作成
      deprecated: false
      description: 新しいロールを作成します
      tags:
        - ロール管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Role'
              required:
                - roleName
                - roleCode
        required: true
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
        '400':
          description: リクエストパラメータ不正
          headers: {}
        '409':
          description: ロールコード重複
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
  /roles/{id}:
    get:
      summary: ロール詳細取得
      deprecated: false
      description: 指定したIDのロール詳細情報を取得します
      tags:
        - ロール管理
      parameters:
        - name: id
          in: path
          description: リソースID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Role'
                    type: object
          headers: {}
        '404':
          description: ロール不存在
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
    put:
      summary: ロール更新
      deprecated: false
      description: 指定したIDのロール情報を更新します
      tags:
        - ロール管理
      parameters:
        - name: id
          in: path
          description: リソースID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Role'
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
        '400':
          description: リクエストパラメータ不正
          headers: {}
        '404':
          description: ロール不存在
          headers: {}
        '409':
          description: ロールコード重複
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
    delete:
      summary: ロール論理削除
      deprecated: false
      description: 指定したIDのロールを論理削除します
      tags:
        - ロール管理
      parameters:
        - name: id
          in: path
          description: リソースID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
        '404':
          description: ロール不存在
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
  /roles/batch-delete:
    post:
      summary: ロール一括論理削除
      deprecated: false
      description: 指定したIDリストのロールを一括で論理削除します
      tags:
        - ロール管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchOperationRequest'
        required: true
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
        '400':
          description: リクエストパラメータ不正
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
  /permission:
    post:
      summary: 権限作成
      deprecated: false
      description: 新規システム権限を作成（システム管理者権限 required）
      tags:
        - 権限管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionCreateRequest'
            example:
              permissionName: レポート承認
              permissionCode: PERM_APPROVE_REPORT
              resourceType: ボタン
              resourceKey: /report/approve
              description: 月次点検レポートの承認権限
        required: true
      responses:
        '200':
          description: 権限作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 権限作成成功
                data:
                  permissionId: 4
                  permissionCode: PERM_APPROVE_REPORT
                timestamp: 1735596000000
          headers: {}
      security:
        - bearerAuth1: []
  /permission/list:
    get:
      summary: 権限一覧取得
      deprecated: false
      description: 全てのシステム権限を取得（論理削除済は含まない）
      tags:
        - 権限管理
      parameters:
        - name: resourceType
          in: query
          description: リソースタイプで絞り込み
          required: false
          example: ボタン
          schema:
            type: string
        - name: isEnabled
          in: query
          description: 有効状態で絞り込み
          required: false
          example: 'true'
          schema:
            type: boolean
