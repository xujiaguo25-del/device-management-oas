      summary: ユーザー-アクセス権連携詳細取得
      deprecated: false
      description: 指定したIDのユーザー-アクセス権連携詳細を取得します
      tags:
        - ユーザー-アクセス権連携管理
      parameters:
        - name: id
          in: path
          description: リソースID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserPermission'
                    type: object
          headers: {}
        '404':
          description: 連携関係不存在
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
    put:
      summary: ユーザー-アクセス権連携更新
      deprecated: false
      description: 指定したIDのユーザー-アクセス権連携情報を更新します
      tags:
        - ユーザー-アクセス権連携管理
      parameters:
        - name: id
          in: path
          description: リソースID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPermission'
              required:
                - grantType
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
        '400':
          description: リクエストパラメータ不正
          headers: {}
        '404':
          description: 連携関係不存在
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
    delete:
      summary: ユーザー-アクセス権連携論理削除
      deprecated: false
      description: 指定したIDのユーザー-アクセス権連携を論理削除します
      tags:
        - ユーザー-アクセス権連携管理
      parameters:
        - name: id
          in: path
          description: リソースID
          required: true
          example: 0
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
        '404':
          description: 連携関係不存在
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
  /user-permissions/batch:
    post:
      summary: ユーザー-アクセス権一括連携
      deprecated: false
      description: ユーザーに対して複数のアクセス権を一括で連携します
      tags:
        - ユーザー-アクセス権連携管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPermissionBatchRequest'
        required: true
      responses:
        '200':
          description: 連携成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
        '400':
          description: リクエストパラメータ不正
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
  /user-permissions/batch-delete:
    post:
      summary: ユーザー-アクセス権一括論理削除
      deprecated: false
      description: 指定したIDリストのユーザー-アクセス権連携を一括で論理削除します
      tags:
        - ユーザー-アクセス権連携管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchOperationRequest'
        required: true
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
        '400':
          description: リクエストパラメータ不正
          headers: {}
        '500':
          description: サーバーエラー
          headers: {}
      security: []
components:
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: レスポンスコード（200：成功）
        message:
          type: string
          description: レスポンスメッセージ
        data:
          type: object
          description: レスポンスデータ
          properties: {}
    LoginRequest:
      type: object
      required:
        - jobNumber
        - password
      properties:
        jobNumber:
          type: string
          description: 社員番号（ログインID）
          example: EMP001
        password:
          type: string
          format: password
          description: パスワード（暗号化送信推奨）
          example: password123
        rememberMe:
          type: boolean
          description: ログイン状態保持フラグ
          example: true
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: アクセストークン（有効期間2時間）
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: リフレッシュトークン（有効期間7日）
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: アクセストークン有効期間（秒）
          example: 7200
        userInfo:
          type: object
          properties:
            userId:
              type: integer
              example: 1
            jobNumber:
              type: string
              example: EMP001
            name:
              type: string
              example: 张三
            deptId:
              type: string
              example: DEPT001
            roleName:
              type: string
              example: システム管理者
            permissions:
              type: array
              items:
                type: string
              example:
                - PERM_VIEW_USER
                - PERM_EDIT_USER
                - PERM_VIEW_DEVICE
    UserCreateRequest:
      type: object
      required:
        - jobNumber
        - name
        - deptId
        - password
        - roleId
      properties:
        jobNumber:
          type: string
          description: 社員番号（ユニーク）
          example: EMP003
        name:
          type: string
          description: 氏名
          example: 劉七
        deptId:
          type: string
          description: 部署番号
          example: DEPT003
        password:
          type: string
          format: password
          description: 初期パスワード
          example: P@ssw0rd
        roleId:
          type: integer
          description: ロールID（ロールテーブル参照）
          example: 2
        userTypeId:
          type: integer
          description: ユーザータイプID（管理者/一般ユーザー）
          example: 2
    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: 劉七郎
        deptId:
          type: string
          example: DEPT003
        roleId:
          type: integer
          example: 1
        userTypeId:
          type: integer
          example: 1
    UserItem:
      type: object
      properties:
        userId:
          type: integer
          example: 3
        jobNumber:
          type: string
          example: EMP003
        name:
          type: string
          example: 劉七
        deptId:
          type: string
          example: DEPT003
        roleName:
          type: string
          example: 一般ユーザー
        userTypeName:
          type: string
          example: 一般ユーザー
        isDeleted:
          type: boolean
          example: false
        createTime:
          type: string
          format: date-time
          example: '2025-12-30T16:00:00.000Z'
        updateTime:
          type: string
          format: date-time
          example: '2025-12-30T16:00:00.000Z'
    RoleCreateRequest:
      type: object
      required:
        - roleName
        - roleCode
      properties:
        roleName:
          type: string
          description: ロール名（ユニーク）
          example: 点検管理者
        roleCode:
          type: string
          description: ロールコード（ユニーク）
          example: ROLE_INSPECTION_ADMIN
        description:
          type: string
          description: ロールの説明
          example: 点検レポートの全権限を保有
        isEnabled:
          type: boolean
          description: 有効フラグ
          example: true
    RoleUpdateRequest:
      type: object
      properties:
        roleName:
          type: string
          example: 点検管理責任者
        description:
          type: string
          example: 点検レポートの作成・承認権限を保有
        isEnabled:
          type: boolean
          example: true
    RoleItem:
      type: object
      properties:
        roleId:
          type: integer
          example: 3
        roleName:
          type: string
          example: 点検管理者
        roleCode:
          type: string
          example: ROLE_INSPECTION_ADMIN
        description:
          type: string
          example: 点検レポートの全権限を保有
        isEnabled:
          type: boolean
          example: true
        isDeleted:
          type: boolean
          example: false
        createTime:
          type: string
          format: date-time
          example: '2025-12-30T18:30:00.000Z'
    PermissionItem:
      type: object
      properties:
        permissionId:
          type: integer
          example: 4
        permissionName:
          type: string
          example: レポート承認
        permissionCode:
          type: string
          example: PERM_APPROVE_REPORT
        resourceType:
          type: string
          example: ボタン
        resourceKey:
          type: string
          example: /report/approve
        description:
          type: string
          example: 月次点検レポートの承認権限
        isEnabled:
          type: boolean
          example: true
        isDeleted:
          type: boolean
          example: false
        createTime:
          type: string
          format: date-time
          example: '2025-12-30T18:00:00.000Z'
    RolePermissionBindRequest:
      type: object
      required:
        - roleId
        - permissionIds
      properties:
        roleId:
          type: integer
          description: ロールID
          example: 3
        permissionIds:
          type: array
          items:
            type: integer
          description: 紐付ける権限IDリスト（既存紐付けは上書き）
          example:
            - 3
            - 4
            - 5
    PermissionCreateRequest:
      type: object
      required:
        - permissionName
        - permissionCode
        - resourceType
        - resourceKey
      properties:
        permissionName:
          type: string
          description: 権限名（表示用）
          example: レポート承認
        permissionCode:
          type: string
          description: 権限コード（ユニーク）
          example: PERM_APPROVE_REPORT
        resourceType:
          type: string
          description: リソースタイプ（メニュー/ボタン/インターフェース）
          example: ボタン
        resourceKey:
          type: string
          description: リソース識別子（URL/ボタンID等）
          example: /report/approve
        description:
          type: string
          description: 権限の説明
          example: 月次点検レポートの承認権限
    PermissionUpdateRequest:
      type: object
      properties:
        permissionName:
          type: string
          example: レポート最終承認
        description:
          type: string
          example: 月次点検レポートの最終承認権限
        isEnabled:
          type: boolean
          description: 有効フラグ（true=有効、false=無効）
          example: true
    RolePermissionItem:
      type: object
      properties:
        roleId:
          type: integer
          example: 3
        roleName:
          type: string
          example: 点検管理者
        permissionList:
          type: array
          items:
            $ref: '#/components/schemas/PermissionItem'
    UserRoleBindRequest:
      type: object
      required:
        - userId
        - roleId
      properties:
        userId:
          type: integer
          description: ユーザーID
          example: 2
        roleId:
          type: integer
          description: ロールID（1ユーザー1ロール）
          example: 3
    UserRoleItem:
      type: object
      properties:
        userId:
          type: integer
          example: 2
        jobNumber:
          type: string
          example: EMP002
        userName:
          type: string
          example: 李四
        roleId:
          type: integer
          example: 3
        roleName:
          type: string
          example: 点検管理者
        roleCode:
          type: string
          example: ROLE_INSPECTION_ADMIN
    UserPermissionBindRequest:
      type: object
      required:
        - userId
        - permissionId
        - grantType
      properties:
        userId:
          type: integer
          description: ユーザーID
          example: 2
        permissionId:
          type: integer
          description: 権限ID
          example: 6
        grantType:
          type: string
          description: 付与タイプ（APPROVE=許可、DENY=拒否）
          example: APPROVE
        expireDate:
          type: string
          format: date
          description: 有効期限（未指定の場合は永続）
          example: '2026-12-31T00:00:00.000Z'
    UserPermissionItem:
      type: object
      properties:
        userId:
          type: integer
          example: 2
        userName:
          type: string
          example: 李四
        permissionId:
          type: integer
          example: 6
        permissionName:
          type: string
          example: 緊急点検作成
        permissionCode:
          type: string
          example: PERM_EMERGENCY_CHECK
        grantType:
          type: string
          example: APPROVE
        expireDate:
          type: string
          format: date
          example: '2026-12-31T00:00:00.000Z'
        createTime:
          type: string
          format: date-time
          example: '2025-12-30T19:00:00.000Z'
    Permission:
      type: object
      properties:
        permissionId:
          type: integer
          format: int64
          description: アクセス権ID（主キー）
        permissionName:
          type: string
          description: アクセス権名
        permissionCode:
          type: string
          description: アクセス権コード（ユニーク）
        resourceType:
          type: string
          description: リソースタイプ（メニュー/ボタン/インターフェース）
        resourceKey:
          type: string
          description: リソース識別子（URL等）
        description:
          type: string
          description: アクセス権の説明
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間
        updateTime:
          type: string
          format: date-time
          description: 更新時間
    Role:
      type: object
      properties:
        roleId:
          type: integer
          format: int64
          description: ロールID（主キー）
        roleName:
          type: string
          description: ロール名
        roleCode:
          type: string
          description: ロールコード（ユニーク）
        description:
          type: string
          description: ロールの説明
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間
        updateTime:
          type: string
          format: date-time
          description: 更新時間
    RolePermission:
      type: object
      properties:
        rolePermissionId:
          type: integer
          format: int64
          description: 連携ID（主キー）
        roleId:
          type: integer
          format: int64
          description: ロールID（外部キー）
        permissionId:
          type: integer
          format: int64
          description: アクセス権ID（外部キー）
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間
    UserRole:
      type: object
      properties:
        userRoleId:
          type: integer
          format: int64
          description: 連携ID（主キー）
        userId:
          type: integer
          format: int64
          description: ユーザーID（外部キー）
        roleId:
          type: integer
          format: int64
          description: ロールID（外部キー）
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間
    UserPermission:
      type: object
      properties:
        userPermissionId:
          type: integer
          format: int64
          description: 連携ID（主キー）
        userId:
          type: integer
          format: int64
          description: ユーザーID（外部キー）
        permissionId:
          type: integer
          format: int64
          description: アクセス権ID（外部キー）
        grantType:
          type: string
          description: 付与タイプ（許可/拒否）
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間
    BatchOperationRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
            format: int64
          description: 一括操作対象のIDリスト
      required:
        - ids
    RolePermissionBatchRequest:
      type: object
      properties:
        roleId:
          type: integer
          format: int64
          description: ロールID
        permissionIds:
          type: array
          items:
            type: integer
            format: int64
          description: アクセス権IDリスト
      required:
        - roleId
        - permissionIds
    UserRoleBatchRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
        roleIds:
          type: array
          items:
            type: integer
            format: int64
          description: ロールIDリスト
      required:
        - userId
        - roleIds
    UserPermissionBatchRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
        permissionIds:
          type: array
          items:
            type: integer
            format: int64
          description: アクセス権IDリスト
        grantType:
          type: string
          description: 付与タイプ（許可/拒否）
      required:
        - userId
        - permissionIds
        - grantType
    Error:
      type: object
      properties:
        code:
          type: integer
          example: 404
        message:
          type: string
          example: 用户不存在
        timestamp:
          type: string
          format: date-time
          example: '2024-01-20T10:30:00.000Z'
  responses:
    UnauthorizedError:
      description: 认证失败或令牌无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            成功示例:
              summary: 成功示例
              value:
                code: 401
                message: 无效的访问令牌
                timestamp: '2024-01-20T10:30:00Z'
    NotFoundError:
      description: 请求的资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            成功示例:
              summary: 成功示例
              value:
                code: 404
                message: 资源不存在
                timestamp: '2024-01-20T10:30:00Z'
  securitySchemes:
    bearerAuth1:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: ログイン後取得したアクセストークンを指定（形式：Bearer {token}）
servers: []
security: []
