openapi: 3.0.3
info:
  title: ユーザー認証・権限追加版）
  description: ユーザーログイン、アクセストークン管理、ロール・権限管理のCRUD機能を含むAPI
  version: 3.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: ローカル開発環境
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: ログイン後取得したアクセストークンを指定（形式：Bearer {token}）
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: 操作成功
        data:
          type: object
        timestamp:
          type: integer
          example: 1735564800000

    # ログイン関連
    LoginRequest:
      type: object
      required: [jobNumber, password]
      properties:
        jobNumber:
          type: string
          description: 社員番号（ログインID）
          example: EMP001
        password:
          type: string
          format: password
          description: パスワード（暗号化送信推奨）
          example: password123
        rememberMe:
          type: boolean
          description: ログイン状態保持フラグ
          example: true

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: アクセストークン（有効期間2時間）
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: リフレッシュトークン（有効期間7日）
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: アクセストークン有効期間（秒）
          example: 7200
        userInfo:
          type: object
          properties:
            userId:
              type: integer
              example: 1
            jobNumber:
              type: string
              example: EMP001
            name:
              type: string
              example: 张三
            deptId:
              type: string
              example: DEPT001
            roleName:
              type: string
              example: システム管理者
            permissions:
              type: array
              items:
                type: string
              example: ["PERM_VIEW_USER", "PERM_EDIT_USER", "PERM_VIEW_DEVICE"]

    # ユーザー管理関連
    UserCreateRequest:
      type: object
      required: [jobNumber, name, deptId, password, roleId]
      properties:
        jobNumber:
          type: string
          description: 社員番号（ユニーク）
          example: EMP003
        name:
          type: string
          description: 氏名
          example: 劉七
        deptId:
          type: string
          description: 部署番号
          example: DEPT003
        password:
          type: string
          format: password
          description: 初期パスワード
          example: P@ssw0rd
        roleId:
          type: integer
          description: ロールID（ロールテーブル参照）
          example: 2
        userTypeId:
          type: integer
          description: ユーザータイプID（管理者/一般ユーザー）
          example: 2

    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: 劉七郎
        deptId:
          type: string
          example: DEPT003
        roleId:
          type: integer
          example: 1
        userTypeId:
          type: integer
          example: 1

    UserItem:
      type: object
      properties:
        userId:
          type: integer
          example: 3
        jobNumber:
          type: string
          example: EMP003
        name:
          type: string
          example: 劉七
        deptId:
          type: string
          example: DEPT003
        roleName:
          type: string
          example: 一般ユーザー
        userTypeName:
          type: string
          example: 一般ユーザー
        isDeleted:
          type: boolean
          example: false
        createTime:
          type: string
          format: date-time
          example: 2025-12-30 16:00:00
        updateTime:
          type: string
          format: date-time
          example: 2025-12-30 16:00:00

    # ロール管理関連
    RoleCreateRequest:
      type: object
      required: [roleName, roleCode]
      properties:
        roleName:
          type: string
          description: ロール名（ユニーク）
          example: 点検管理者
        roleCode:
          type: string
          description: ロールコード（ユニーク）
          example: ROLE_INSPECTION_ADMIN
        description:
          type: string
          description: ロール説明
          example: 点検レポートの全権限を保有

    RoleUpdateRequest:
      type: object
      properties:
        roleName:
          type: string
          example: 点検管理責任者
        description:
          type: string
          example: 点検レポートの作成・承認権限を保有

    RoleItem:
      type: object
      properties:
        roleId:
          type: integer
          example: 3
        roleName:
          type: string
          example: 点検管理者
        roleCode:
          type: string
          example: ROLE_INSPECTION_ADMIN
        description:
          type: string
          example: 点検レポートの全権限を保有
        isDeleted:
          type: boolean
          example: false
        createTime:
          type: string
          format: date-time
          example: 2025-12-30 16:30:00

    # 権限管理関連
    PermissionItem:
      type: object
      properties:
        permissionId:
          type: integer
          example: 4
        permissionName:
          type: string
          example: レポート承認
        permissionCode:
          type: string
          example: PERM_APPROVE_REPORT
        resourceType:
          type: string
          example: ボタン
        resourceKey:
          type: string
          example: /report/approve
        description:
          type: string
          example: 月次点検レポートの承認権限

    # ロール-権限紐付け関連
    RolePermissionBindRequest:
      type: object
      required: [roleId, permissionIds]
      properties:
        roleId:
          type: integer
          description: ロールID
          example: 3
        permissionIds:
          type: array
          items:
            type: integer
          description: 紐付ける権限IDリスト
          example: [3, 4, 5]

paths:
  # ------------------------------
  # ユーザー認証関連
  # ------------------------------
  /auth/login:
    post:
      summary: ユーザーログイン
      description: 社員番号とパスワードでログインし、トークンを取得
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              jobNumber: EMP001
              password: password123
              rememberMe: true
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ログイン成功
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsImpvYk51bWJlciI6IkVNUDgwMSIsIm5hbWUiOiLnlLXopoHvvIgifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsImpvYk51bWJlciI6IkVNUDgwMSIsIm5hbWUiOiLnlLXopoHvvIgifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
                  tokenType: Bearer
                  expiresIn: 7200
                  userInfo:
                    userId: 1
                    jobNumber: EMP001
                    name: 张三
                    deptId: DEPT001
                    roleName: システム管理者
                    permissions: ["PERM_VIEW_USER", "PERM_EDIT_USER", "PERM_VIEW_DEVICE"]
                timestamp: 1735584000000
        '401':
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 401
                message: 社員番号またはパスワードが不正です
                data: null
                timestamp: 1735584000000

  /auth/logout:
    post:
      summary: ユーザーログアウト
      description: トークンを無効化し、ログイン状態を解除
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ログアウト成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ログアウト成功
                data: null
                timestamp: 1735587600000

  /auth/refresh-token:
    post:
      summary: トークンリフレッシュ
      description: リフレッシュトークンで新しいアクセストークンを取得
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsImpvYk51bWJlciI6IkVNUDgwMSIsIm5hbWUiOiLnlLXopoHvvIgifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
      responses:
        '200':
          description: トークンリフレッシュ成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: トークンリフレッシュ成功
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsImpvYk51bWJlciI6IkVNUDgwMSIsIm5hbWUiOiLnlLXopoHvvIgifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
                  tokenType: Bearer
                  expiresIn: 7200
                timestamp: 1735587600000

  # ------------------------------
  # ユーザー管理関連（CRUD）
  # ------------------------------
  /user:
    post:
      summary: ユーザー作成
      description: 新規ユーザーを作成（システム管理者権限 required）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
            example:
              jobNumber: EMP003
              name: 劉七
              deptId: DEPT003
              password: P@ssw0rd
              roleId: 2
              userTypeId: 2
      responses:
        '200':
          description: ユーザー作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ユーザー作成成功
                data:
                  userId: 3
                  jobNumber: EMP003
                  name: 劉七
                timestamp: 1735588800000
        '403':
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 403
                message: ユーザー作成権限がありません
                data: null
                timestamp: 1735588800000

  /user/list:
    get:
      summary: ユーザー一覧取得
      description: ユーザー一覧を取得（論理削除済は含まない）
      security:
        - bearerAuth: []
      parameters:
        - name: deptId
          in: query
          required: false
          schema:
            type: string
          description: 部署番号で絞り込み
          example: DEPT001
        - name: roleId
          in: query
          required: false
          schema:
            type: integer
          description: ロールIDで絞り込み
          example: 1
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  totalCount: 2
                  userList:
                    - userId: 1
                      jobNumber: EMP001
                      name: 张三
                      deptId: DEPT001
                      roleName: システム管理者
                      userTypeName: 管理者
                      isDeleted: false
                      createTime: 2025-12-30 00:01:57
                      updateTime: 2025-12-30 00:01:57
                    - userId: 2
                      jobNumber: EMP002
                      name: 李四
                      deptId: DEPT002
                      roleName: 一般ユーザー
                      userTypeName: 一般ユーザー
                      isDeleted: false
                      createTime: 2025-12-30 00:01:57
                      updateTime: 2025-12-30 00:01:57
                timestamp: 1735589400000

  /user/{userId}:
    get:
      summary: ユーザー詳細取得
      description: ユーザーIDで詳細情報を取得
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  userId: 1
                  jobNumber: EMP001
                  name: 张三
                  deptId: DEPT001
                  roleName: システム管理者
                  userTypeName: 管理者
                  permissions: ["PERM_VIEW_USER", "PERM_EDIT_USER", "PERM_VIEW_DEVICE"]
                  isDeleted: false
                  createTime: 2025-12-30 00:01:57
                  updateTime: 2025-12-30 00:01:57
                timestamp: 1735589400000

    put:
      summary: ユーザー情報更新
      description: ユーザーIDで情報を更新
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          example: 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            example:
              name: 李四郎
              deptId: DEPT002
              roleId: 1
              userTypeId: 1
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 更新成功
                data:
                  userId: 2
                  updateTime: 2025-12-30 17:00:00
                timestamp: 1735590000000

    delete:
      summary: ユーザー論理削除
      description: ユーザーIDで論理削除（is_deleted=true）
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          example: 3
      responses:
        '200':
          description: 論理削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ユーザー論理削除成功
                data:
                  userId: 3
                  isDeleted: true
                timestamp: 1735590600000

  # ------------------------------
  # ロール管理関連（CRUD）
  # ------------------------------
  /role:
    post:
      summary: ロール作成
      description: 新規ロールを作成（システム管理者権限 required）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateRequest'
            example:
              roleName: 点検管理者
              roleCode: ROLE_INSPECTION_ADMIN
              description: 点検レポートの全権限を保有
      responses:
        '200':
          description: ロール作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ロール作成成功
                data:
                  roleId: 3
                  roleName: 点検管理者
                  roleCode: ROLE_INSPECTION_ADMIN
                timestamp: 1735591200000

  /role/list:
    get:
      summary: ロール一覧取得
      description: ロール一覧を取得（論理削除済は含まない）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  totalCount: 3
                  roleList:
                    - roleId: 1
                      roleName: システム管理者
                      roleCode: ROLE_ADMIN
                      description: システムの全権限を保有
                      isDeleted: false
                      createTime: 2025-12-30 00:01:57
                    - roleId: 2
                      roleName: 一般ユーザー
                      roleCode: ROLE_USER
                      description: 一般ユーザーの権限を保有
                      isDeleted: false
                      createTime: 2025-12-30 00:01:57
                    - roleId: 3
                      roleName: 点検管理者
                      roleCode: ROLE_INSPECTION_ADMIN
                      description: 点検レポートの全権限を保有
                      isDeleted: false
                      createTime: 2025-12-30 17:20:00
                timestamp: 1735591800000

  /role/{roleId}:
    get:
      summary: ロール詳細取得
      description: ロールIDで詳細情報と紐付く権限を取得
      security:
        - bearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
          example: 3
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  roleId: 3
                  roleName: 点検管理者
                  roleCode: ROLE_INSPECTION_ADMIN
                  description: 点検レポートの全権限を保有
                  permissions:
                    - permissionId: 3
                      permissionName: 機器参照
                      permissionCode: PERM_VIEW_DEVICE
                    - permissionId: 4
                      permissionName: レポート承認
                      permissionCode: PERM_APPROVE_REPORT
                isDeleted: false
                createTime: 2025-12-30 17:20:00
                timestamp: 1735591800000

    put:
      summary: ロール情報更新
      description: ロールIDで情報を更新
      security:
        - bearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdateRequest'
            example:
              roleName: 点検管理責任者
              description: 点検レポートの作成・承認権限を保有
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ロール更新成功
                data:
                  roleId: 3
                  updateTime: 2025-12-30 17:30:00
                timestamp: 1735592400000

    delete:
      summary: ロール論理削除
      description: ロールIDで論理削除（is_deleted=true）
      security:
        - bearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
          example: 3
      responses:
        '200':
          description: 論理削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ロール論理削除成功
                data:
                  roleId: 3
                  isDeleted: true
                timestamp: 1735593000000

  # ------------------------------
  # ロール-権限紐付け関連
  # ------------------------------
  /role/permission/bind:
    post:
      summary: ロール-権限紐付け
      description: ロールに権限を紐付け（既存紐付けは上書き）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolePermissionBindRequest'
            example:
              roleId: 3
              permissionIds: [3, 4, 5]
      responses:
        '200':
          description: 紐付け成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: ロール-権限紐付け成功
                data:
                  roleId: 3
                  permissionIds: [3, 4, 5]
                timestamp: 1735593600000

  /permission/list:
    get:
      summary: 全権限一覧取得
      description: システムで定義された全権限を取得
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  permissionList:
                    - permissionId: 1
                      permissionName: ユーザー参照
                      permissionCode: PERM_VIEW_USER
                      resourceType: メニュー
                      resourceKey: /user/list
                      description: ユーザー一覧の参照権限
                    - permissionId: 2
                      permissionName: ユーザー編集
                      permissionCode: PERM_EDIT_USER
                      resourceType: ボタン
                      resourceKey: /user/edit
                      description: ユーザー情報の編集権限
                    - permissionId: 3
                      permissionName: 機器参照
                      permissionCode: PERM_VIEW_DEVICE
                      resourceType: メニュー
                      resourceKey: /device/list
                      description: 機器情報の参照権限
                timestamp: 1735594200000