openapi: 3.0.3
info:
  title: アクセス権管理システムAPI
  description: ロール管理、アクセス権管理、ロール-アクセス権連携、ユーザー-ロール連携、ユーザー-アクセス権連携の完全なCRUD操作を提供し、論理削除に対応
  version: 1.0.0
servers:
  - url: /api/v1

tags:
  - name: アクセス権管理
    description: アクセス権の作成、取得、更新、論理削除等の操作
  - name: ロール管理
    description: ロールの作成、取得、更新、論理削除等の操作
  - name: ロール-アクセス権連携管理
    description: ロールとアクセス権の連携・解除等の操作
  - name: ユーザー-ロール連携管理
    description: ユーザーとロールの連携・解除等の操作
  - name: ユーザー-アクセス権連携管理
    description: ユーザーとアクセス権の連携・解除等の操作

components:
  schemas:
    # 共通レスポンスモデル
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: レスポンスコード（200：成功）
        message:
          type: string
          description: レスポンスメッセージ
        data:
          type: object
          description: レスポンスデータ

    # アクセス権モデル
    Permission:
      type: object
      properties:
        permissionId:
          type: integer
          format: int64
          description: アクセス権ID（主キー）
        permissionName:
          type: string
          description: アクセス権名
        permissionCode:
          type: string
          description: アクセス権コード（ユニーク）
        resourceType:
          type: string
          description: リソースタイプ（メニュー/ボタン/インターフェース）
        resourceKey:
          type: string
          description: リソース識別子（URL等）
        description:
          type: string
          description: アクセス権の説明
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間
        updateTime:
          type: string
          format: date-time
          description: 更新時間

    # ロールモデル
    Role:
      type: object
      properties:
        roleId:
          type: integer
          format: int64
          description: ロールID（主キー）
        roleName:
          type: string
          description: ロール名
        roleCode:
          type: string
          description: ロールコード（ユニーク）
        description:
          type: string
          description: ロールの説明
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間
        updateTime:
          type: string
          format: date-time
          description: 更新時間

    # ロール-アクセス権連携モデル
    RolePermission:
      type: object
      properties:
        rolePermissionId:
          type: integer
          format: int64
          description: 連携ID（主キー）
        roleId:
          type: integer
          format: int64
          description: ロールID（外部キー）
        permissionId:
          type: integer
          format: int64
          description: アクセス権ID（外部キー）
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間

    # ユーザー-ロール連携モデル
    UserRole:
      type: object
      properties:
        userRoleId:
          type: integer
          format: int64
          description: 連携ID（主キー）
        userId:
          type: integer
          format: int64
          description: ユーザーID（外部キー）
        roleId:
          type: integer
          format: int64
          description: ロールID（外部キー）
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間

    # ユーザー-アクセス権連携モデル
    UserPermission:
      type: object
      properties:
        userPermissionId:
          type: integer
          format: int64
          description: 連携ID（主キー）
        userId:
          type: integer
          format: int64
          description: ユーザーID（外部キー）
        permissionId:
          type: integer
          format: int64
          description: アクセス権ID（外部キー）
        grantType:
          type: string
          description: 付与タイプ（許可/拒否）
        isDeleted:
          type: boolean
          default: false
          description: 論理削除フラグ（false：未削除、true：削除済）
        createTime:
          type: string
          format: date-time
          description: 作成時間

    # 一括操作リクエスト
    BatchOperationRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
            format: int64
          description: 一括操作対象のIDリスト
      required:
        - ids

    # ロール-アクセス権一括連携リクエスト
    RolePermissionBatchRequest:
      type: object
      properties:
        roleId:
          type: integer
          format: int64
          description: ロールID
        permissionIds:
          type: array
          items:
            type: integer
            format: int64
          description: アクセス権IDリスト
      required:
        - roleId
        - permissionIds

    # ユーザー-ロール一括連携リクエスト
    UserRoleBatchRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
        roleIds:
          type: array
          items:
            type: integer
            format: int64
          description: ロールIDリスト
      required:
        - userId
        - roleIds

    # ユーザー-アクセス権一括連携リクエスト
    UserPermissionBatchRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
        permissionIds:
          type: array
          items:
            type: integer
            format: int64
          description: アクセス権IDリスト
        grantType:
          type: string
          description: 付与タイプ（許可/拒否）
      required:
        - userId
        - permissionIds
        - grantType

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: リソースID
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: ページ番号
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
      description: 1ページあたりの件数
    KeywordParam:
      name: keyword
      in: query
      schema:
        type: string
      description: 検索キーワード
    RoleIdParam:
      name: roleId
      in: query
      schema:
        type: integer
        format: int64
      description: ロールID
    UserIdParam:
      name: userId
      in: query
      schema:
        type: integer
        format: int64
      description: ユーザーID
    PermissionIdParam:
      name: permissionId
      in: query
      schema:
        type: integer
        format: int64
      description: アクセス権ID

paths:
  # アクセス権管理API
  /permissions:
    get:
      tags: [アクセス権管理]
      summary: アクセス権一覧取得
      description: アクセス権の一覧をページング検索します
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/KeywordParam'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          total:
                            type: integer
                            description: 総件数
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Permission'
        '400':
          description: リクエストパラメータ不正
        '500':
          description: サーバーエラー
    post:
      tags: [アクセス権管理]
      summary: アクセス権新規作成
      description: 新しいアクセス権を作成します
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Permission'
              required:
                - permissionName
                - permissionCode
                - resourceType
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '409':
          description: アクセス権コード重複
        '500':
          description: サーバーエラー

  /permissions/{id}:
    get:
      tags: [アクセス権管理]
      summary: アクセス権詳細取得
      description: 指定したIDのアクセス権詳細情報を取得します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Permission'
        '404':
          description: アクセス権不存在
        '500':
          description: サーバーエラー
    put:
      tags: [アクセス権管理]
      summary: アクセス権更新
      description: 指定したIDのアクセス権情報を更新します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Permission'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '404':
          description: アクセス権不存在
        '409':
          description: アクセス権コード重複
        '500':
          description: サーバーエラー
    delete:
      tags: [アクセス権管理]
      summary: アクセス権論理削除
      description: 指定したIDのアクセス権を論理削除します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: アクセス権不存在
        '500':
          description: サーバーエラー

  /permissions/batch-delete:
    post:
      tags: [アクセス権管理]
      summary: アクセス権一括論理削除
      description: 指定したIDリストのアクセス権を一括で論理削除します
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchOperationRequest'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '500':
          description: サーバーエラー

  # ロール管理API
  /roles:
    get:
      tags: [ロール管理]
      summary: ロール一覧取得
      description: ロールの一覧をページング検索します
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/KeywordParam'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          total:
                            type: integer
                            description: 総件数
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Role'
        '400':
          description: リクエストパラメータ不正
        '500':
          description: サーバーエラー
    post:
      tags: [ロール管理]
      summary: ロール新規作成
      description: 新しいロールを作成します
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Role'
              required:
                - roleName
                - roleCode
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '409':
          description: ロールコード重複
        '500':
          description: サーバーエラー

  /roles/{id}:
    get:
      tags: [ロール管理]
      summary: ロール詳細取得
      description: 指定したIDのロール詳細情報を取得します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Role'
        '404':
          description: ロール不存在
        '500':
          description: サーバーエラー
    put:
      tags: [ロール管理]
      summary: ロール更新
      description: 指定したIDのロール情報を更新します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Role'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '404':
          description: ロール不存在
        '409':
          description: ロールコード重複
        '500':
          description: サーバーエラー
    delete:
      tags: [ロール管理]
      summary: ロール論理削除
      description: 指定したIDのロールを論理削除します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: ロール不存在
        '500':
          description: サーバーエラー

  /roles/batch-delete:
    post:
      tags: [ロール管理]
      summary: ロール一括論理削除
      description: 指定したIDリストのロールを一括で論理削除します
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchOperationRequest'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '500':
          description: サーバーエラー

  # ロール-アクセス権連携管理API
  /role-permissions:
    get:
      tags: [ロール-アクセス権連携管理]
      summary: ロール-アクセス権連携一覧取得
      description: ロール-アクセス権連携情報の一覧を検索します
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/RoleIdParam'
        - $ref: '#/components/parameters/PermissionIdParam'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          total:
                            type: integer
                            description: 総件数
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/RolePermission'
        '400':
          description: リクエストパラメータ不正
        '500':
          description: サーバーエラー
    post:
      tags: [ロール-アクセス権連携管理]
      summary: ロール-アクセス権連携作成
      description: 新しいロール-アクセス権連携を作成します
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolePermission'
              required:
                - roleId
                - permissionId
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '409':
          description: 連携関係既に存在
        '500':
          description: サーバーエラー

  /role-permissions/{id}:
    get:
      tags: [ロール-アクセス権連携管理]
      summary: ロール-アクセス権連携詳細取得
      description: 指定したIDのロール-アクセス権連携詳細を取得します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/RolePermission'
        '404':
          description: 連携関係不存在
        '500':
          description: サーバーエラー
    delete:
      tags: [ロール-アクセス権連携管理]
      summary: ロール-アクセス権連携論理削除
      description: 指定したIDのロール-アクセス権連携を論理削除します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: 連携関係不存在
        '500':
          description: サーバーエラー

  /role-permissions/batch:
    post:
      tags: [ロール-アクセス権連携管理]
      summary: ロール-アクセス権一括連携
      description: ロールに対して複数のアクセス権を一括で連携します
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolePermissionBatchRequest'
      responses:
        '200':
          description: 連携成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '500':
          description: サーバーエラー

  /role-permissions/batch-delete:
    post:
      tags: [ロール-アクセス権連携管理]
      summary: ロール-アクセス権一括論理削除
      description: 指定したIDリストのロール-アクセス権連携を一括で論理削除します
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchOperationRequest'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '500':
          description: サーバーエラー

  # ユーザー-ロール連携管理API
  /user-roles:
    get:
      tags: [ユーザー-ロール連携管理]
      summary: ユーザー-ロール連携一覧取得
      description: ユーザー-ロール連携情報の一覧を検索します
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/UserIdParam'
        - $ref: '#/components/parameters/RoleIdParam'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          total:
                            type: integer
                            description: 総件数
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/UserRole'
        '400':
          description: リクエストパラメータ不正
        '500':
          description: サーバーエラー
    post:
      tags: [ユーザー-ロール連携管理]
      summary: ユーザー-ロール連携作成
      description: 新しいユーザー-ロール連携を作成します
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRole'
              required:
                - userId
                - roleId
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: リクエストパラメータ不正
        '409':
          description: 連携関係既に存在
        '500':
          description: サーバーエラー

  /user-roles/{id}:
    get:
      tags: [ユーザー-ロール連携管理]
      summary: ユーザー-ロール連携詳細取得
      description: 指定したIDのユーザー-ロール連携詳細を取得します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserRole'
        '404':
          description: 連携関係不存在
        '500':
          description: サーバーエラー
    delete:
      tags: [ユーザー-ロール連携管理]
      summary: ユーザー-ロール連携論理削除
      description: 指定したIDのユーザー-ロール連携を論理削除します
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
