openapi: 3.0.3
info:
  title: 月次安全点検レポートAPI（サンプリング/非サンプリング追加版）
  description: サンプリング・非サンプリング点検のCRUD機能を含む月次安全点検レポートAPI
  version: 2.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: ローカル開発環境
paths:
  # ------------------------------
  # 非サンプリング点検 CRUD
  # ------------------------------
  /non-sampling-check:
    post:
      summary: 非サンプリング点検を作成
      description: 新規非サンプリング点検レコードを作成し、レポートに紐付け
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NonSamplingCheckCreateRequest'
            example:
              reportId: REPORT001
              privateMobileDevId: 5
              unrecordedWifiId: 6
              floorAccessClosedId: 3
              disposalMeasures: 異常なし
              checkUser: 王五
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 非サンプリング点検作成成功
                data:
                  nonSamplingId: NSC001
                  createTime: 2025-12-30 14:00:00
                timestamp: 1735574400000

  /non-sampling-check/list:
    get:
      summary: 非サンプリング点検一覧を取得
      description: レポート番号等の条件で非サンプリング点検一覧を取得（論理削除済は含まない）
      parameters:
        - name: reportId
          in: query
          required: false
          schema:
            type: string
          description: 紐付くレポート番号
          example: REPORT001
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: 点検日開始
          example: 2025-12-01
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  totalCount: 1
                  checkList:
                    - nonSamplingId: NSC001
                      reportId: REPORT001
                      privateMobileDevStatus: 存在する
                      unrecordedWifiStatus: 存在する
                      floorAccessClosedStatus: 確認済
                      disposalMeasures: 異常なし
                      checkUser: 王五
                      createTime: 2025-12-30 14:00:00
                timestamp: 1735574400000

  /non-sampling-check/{nonSamplingId}:
    get:
      summary: 非サンプリング点検詳細を取得
      description: 非サンプリング点検IDで詳細情報を取得
      parameters:
        - name: nonSamplingId
          in: path
          required: true
          schema:
            type: string
          description: 非サンプリング点検ID
          example: NSC001
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  nonSamplingId: NSC001
                  reportId: REPORT001
                  privateMobileDevId: 5
                  privateMobileDevStatus: 存在する
                  unrecordedWifiId: 6
                  unrecordedWifiStatus: 存在する
                  floorAccessClosedId: 3
                  floorAccessClosedStatus: 確認済
                  disposalMeasures: 異常なし
                  checkUser: 王五
                  createTime: 2025-12-30 14:00:00
                timestamp: 1735574400000

    put:
      summary: 非サンプリング点検を更新
      description: 非サンプリング点検IDで情報を更新
      parameters:
        - name: nonSamplingId
          in: path
          required: true
          schema:
            type: string
          example: NSC001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NonSamplingCheckUpdateRequest'
            example:
              disposalMeasures: 再確認済、異常なし
              checkUser: 趙六
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 更新成功
                data:
                  nonSamplingId: NSC001
                  updateTime: 2025-12-30 14:30:00
                timestamp: 1735576200000

    delete:
      summary: 非サンプリング点検を論理削除
      description: 非サンプリング点検IDで論理削除（is_deletedフラグをtrueに設定）
      parameters:
        - name: nonSamplingId
          in: path
          required: true
          schema:
            type: string
          example: NSC001
      responses:
        '200':
          description: 論理削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 論理削除成功
                data:
                  nonSamplingId: NSC001
                  isDeleted: true
                timestamp: 1735576800000

  # ------------------------------
  # サンプリング点検 CRUD
  # ------------------------------
  /sampling-check:
    post:
      summary: サンプリング点検を作成
      description: 新規サンプリング点検レコードを作成（機器ごとの点検）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SamplingCheckCreateRequest'
            example:
              reportId: REPORT001
              deviceId: DEV001
              osVersionCheck: 適合
              patchUpdateStatus: 最新
              checkUser: 张三
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: サンプリング点検作成成功
                data:
                  samplingId: SC001
                  createTime: 2025-12-30 15:00:00
                timestamp: 1735578000000

  /sampling-check/list:
    get:
      summary: サンプリング点検一覧を取得
      description: レポート/機器番号でサンプリング点検一覧を取得（論理削除済は含まない）
      parameters:
        - name: reportId
          in: query
          required: false
          schema:
            type: string
          example: REPORT001
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
          example: DEV001
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  totalCount: 1
                  checkList:
                    - samplingId: SC001
                      reportId: REPORT001
                      deviceId: DEV001
                      deviceModel: Dell XPS
                      osVersionCheck: 適合
                      patchUpdateStatus: 最新
                      checkUser: 张三
                      createTime: 2025-12-30 15:00:00
                timestamp: 1735578000000

  /sampling-check/{samplingId}:
    get:
      summary: サンプリング点検詳細を取得
      description: サンプリング点検IDで詳細情報を取得
      parameters:
        - name: samplingId
          in: path
          required: true
          schema:
            type: string
          example: SC001
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 取得成功
                data:
                  samplingId: SC001
                  reportId: REPORT001
                  deviceId: DEV001
                  osVersionCheck: 適合
                  patchUpdateStatus: 最新
                  checkUser: 张三
                  createTime: 2025-12-30 15:00:00
                timestamp: 1735578000000

    put:
      summary: サンプリング点検を更新
      description: サンプリング点検IDで情報を更新
      parameters:
        - name: samplingId
          in: path
          required: true
          schema:
            type: string
          example: SC001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SamplingCheckUpdateRequest'
            example:
              patchUpdateStatus: 一部未適用
              checkUser: 李四
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 更新成功
                data:
                  samplingId: SC001
                  updateTime: 2025-12-30 15:30:00
                timestamp: 1735579800000

    delete:
      summary: サンプリング点検を論理削除
      description: サンプリング点検IDで論理削除（is_deletedフラグをtrueに設定）
      parameters:
        - name: samplingId
          in: path
          required: true
          schema:
            type: string
          example: SC001
      responses:
        '200':
          description: 論理削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 論理削除成功
                data:
                  samplingId: SC001
                  isDeleted: true
                timestamp: 1735580400000

components:
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: 操作成功
        data:
          type: object
        timestamp:
          type: integer
          example: 1735564800000

    # 非サンプリング点検リクエスト
    NonSamplingCheckCreateRequest:
      type: object
      properties:
        reportId:
          type: string
          description: 紐付くレポート番号
          example: REPORT001
        privateMobileDevId:
          type: integer
          description: 個人携帯端末状態ID
          example: 5
        unrecordedWifiId:
          type: integer
          description: 未登録WiFi状態ID
          example: 6
        floorAccessClosedId:
          type: integer
          description: フロア出入管理状態ID
          example: 3
        disposalMeasures:
          type: string
          description: 処置措置
          example: 異常なし
        checkUser:
          type: string
          description: 点検者
          example: 王五

    NonSamplingCheckUpdateRequest:
      type: object
      properties:
        disposalMeasures:
          type: string
          example: 再確認済、異常なし
        checkUser:
          type: string
          example: 趙六

    # サンプリング点検リクエスト
    SamplingCheckCreateRequest:
      type: object
      properties:
        reportId:
          type: string
          description: 紐付くレポート番号
          example: REPORT001
        deviceId:
          type: string
          description: 点検対象機器ID
          example: DEV001
        osVersionCheck:
          type: string
          description: OSバージョン適合性
          example: 適合
        patchUpdateStatus:
          type: string
          description: パッチ更新状態
          example: 最新
        checkUser:
          type: string
          description: 点検者
          example: 张三

    SamplingCheckUpdateRequest:
      type: object
      properties:
        osVersionCheck:
          type: string
          example: 適合
        patchUpdateStatus:
          type: string
          example: 一部未適用
        checkUser:
          type: string
          example: 李四