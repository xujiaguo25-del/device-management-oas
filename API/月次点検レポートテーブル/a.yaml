openapi: 3.0.3
info:
  title: 月次安全点検レポートAPI
  description: PostgreSQLデータベースに基づく月次安全点検レポートのクエリ、作成、更新、削除機能を提供するAPIセット
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: ローカル開発環境


tags:
  - name: 月次レポート
    description: 月次レポート操作
  - name: 认证
    description: 用户认证相关操作

paths:
  /monthly-report/summary:
    get:
      summary: 月次レポート集計をクエリ
      description: 日付範囲・部署等の条件で月次レポートの集計データを取得
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: レポート開始日（yyyy-MM-dd）
          example: 2025-12-01
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: レポート終了日（yyyy-MM-dd）
          example: 2025-12-31
        - name: deptId
          in: query
          required: false
          schema:
            type: string
          description: 部署番号（絞り込み条件）
          example: DEPT001
        - name: workArea
          in: query
          required: false
          schema:
            type: string
          description: 作業エリア（絞り込み条件）
          example: AreaA
      responses:
        '200':
          description: クエリ成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 操作成功
                data:
                  totalReports: 2
                  reportList:
                    - reportId: REPORT001
                      reportDate: 2025-12-01
                      workArea: AreaA
                      deptId: DEPT001
                      securityPromoter: 王五
                      securityResponsible: 趙六
                      nonSamplingCheckCount: 1
                      domainComplianceRate: 50.00
                      antivirusComplianceRate: 50.00
                    - reportId: REPORT002
                      reportDate: 2025-12-02
                      workArea: AreaB
                      deptId: DEPT002
                      securityPromoter: 張三
                      securityResponsible: 李四
                      nonSamplingCheckCount: 0
                      domainComplianceRate: 100.00
                      antivirusComplianceRate: 80.00
                timestamp: 1735564800000
        '400':
          description: パラメータエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 400
                message: パラメータエラー：startDateの形式が不正（yyyy-MM-ddで入力してください）
                data: null
                timestamp: 1735565100000

  /monthly-report/detail/{reportId}:
    get:
      summary: レポート詳細（機器状態含む）をクエリ
      description: レポート番号で詳細情報と関連機器の状態を取得
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          description: レポート番号（プライマリキー）
          example: REPORT001
      responses:
        '200':
          description: クエリ成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 操作成功
                data:
                  reportBaseInfo:
                    reportId: REPORT001
                    reportDate: 2025-12-01
                    workArea: AreaA
                    deptId: DEPT001
                    securityPromoter: 王五
                    securityResponsible: 趙六
                    qualityDept: 品質部
                    checkRemark: null
                    createTime: 2025-12-30 00:01:57
                  nonSamplingCheck:
                    nonSamplingId: NSC001
                    privateMobileDevStatus: 存在する
                    unrecordedWifiStatus: 存在する
                    floorAccessClosedStatus: 確認済
                    disposalMeasures: null
                  deviceCheckList:
                    - deviceId: DEV001
                      deviceModel: Dell XPS
                      computerName: PC-DELL-001
                      ipAddress: 192.168.1.101
                      loginUsername: zhangsan
                      jobNumber: EMP001
                      domainStatus: 加入済
                      antivirusStatus: インストール済
                      usbStatus: 有効化済
                      osType: Windows10
                      memorySize: 16.0G
                      ssdSize: 256.0G
                      hddSize: 1024.0G
                timestamp: 1735564800000
        '404':
          description: レポートが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 404
                message: レポート番号REPORT999は存在しません
                data: null
                timestamp: 1735565000000

  /monthly-report:
    post:
      summary: 月次レポートを作成
      description: 新規月次安全点検レポートを作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreateRequest'
            example:
              reportDate: 2025-12-03
              workArea: AreaC
              deptId: DEPT003
              securityPromoter: 劉七
              securityResponsible: 孫八
              qualityDept: 品質部
              checkRemark: 12月第1週安全点検
              checkDescription: 機器コンプライアンスを重点点検
              nonSamplingCheck:
                privateMobileDevId: 5
                unrecordedWifiId: 6
                floorAccessClosedId: 3
                disposalMeasures: 異常なし
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 操作成功
                data:
                  reportId: REPORT003
                  message: レポート作成成功
                  createTime: 2025-12-30 10:30:00
                timestamp: 1735564800000

  /monthly-report/{reportId}:
    put:
      summary: 月次レポートを更新
      description: レポート番号でレポート情報を更新
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          description: レポート番号（プライマリキー）
          example: REPORT003
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportUpdateRequest'
            example:
              securityPromoter: 劉七
              securityResponsible: 孫八
              checkRemark: 12月第1週安全点検（更新）
              nonSamplingCheck:
                disposalMeasures: 全点検完了、異常なし
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 操作成功
                data:
                  reportId: REPORT003
                  message: レポート更新成功
                  updateTime: 2025-12-30 11:20:00
                timestamp: 1735564800000
        '404':
          description: レポートが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 404
                message: レポート番号REPORT999は存在しません
                data: null
                timestamp: 1735565000000

    delete:
      summary: 月次レポートを削除
      description: レポート番号でレポートを削除（関連データも同時に削除）
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          description: レポート番号（プライマリキー）
          example: REPORT003
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 200
                message: 操作成功
                data:
                  reportId: REPORT003
                  message: レポート削除成功
                timestamp: 1735564800000
        '404':
          description: レポートが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 404
                message: レポート番号REPORT999は存在しません
                data: null
                timestamp: 1735565000000

components:
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: レスポンスステータスコード
          example: 200
        message:
          type: string
          description: レスポンスメッセージ
          example: 操作成功
        data:
          type: object
          description: レスポンスデータ
        timestamp:
          type: integer
          description: タイムスタンプ
          example: 1735564800000

    ReportSummaryItem:
      type: object
      properties:
        reportId:
          type: string
          example: REPORT001
        reportDate:
          type: string
          format: date
          example: 2025-12-01
        workArea:
          type: string
          example: AreaA
        deptId:
          type: string
          example: DEPT001
        securityPromoter:
          type: string
          example: 王五
        securityResponsible:
          type: string
          example: 趙六
        nonSamplingCheckCount:
          type: integer
          example: 1
        domainComplianceRate:
          type: number
          format: float
          example: 50.00
        antivirusComplianceRate:
          type: number
          format: float
          example: 50.00

    DeviceCheckItem:
      type: object
      properties:
        deviceId:
          type: string
          example: DEV001
        deviceModel:
          type: string
          example: Dell XPS
        computerName:
          type: string
          example: PC-DELL-001
        ipAddress:
          type: string
          example: 192.168.1.101
        loginUsername:
          type: string
          example: zhangsan
        jobNumber:
          type: string
          example: EMP001
        domainStatus:
          type: string
          example: 加入済
        antivirusStatus:
          type: string
          example: インストール済
        usbStatus:
          type: string
          example: 有効化済
        osType:
          type: string
          example: Windows10
        memorySize:
          type: string
          example: 16.0G
        ssdSize:
          type: string
          example: 256.0G
        hddSize:
          type: string
          example: 1024.0G

    ReportCreateRequest:
      type: object
      properties:
        reportDate:
          type: string
          format: date
          example: 2025-12-03
        workArea:
          type: string
          example: AreaC
        deptId:
          type: string
          example: DEPT003
        securityPromoter:
          type: string
          example: 劉七
        securityResponsible:
          type: string
          example: 孫八
        qualityDept:
          type: string
          example: 品質部
        checkRemark:
          type: string
          example: 12月第1週安全点検
        checkDescription:
          type: string
          example: 機器コンプライアンスを重点点検
        nonSamplingCheck:
          type: object
          properties:
            privateMobileDevId:
              type: integer
              example: 5
            unrecordedWifiId:
              type: integer
              example: 6
            floorAccessClosedId:
              type: integer
              example: 3
            disposalMeasures:
              type: string
              example: 異常なし

    ReportUpdateRequest:
      type: object
      properties:
        securityPromoter:
          type: string
          example: 劉七
        securityResponsible:
          type: string
          example: 孫八
        checkRemark:
          type: string
          example: 12月第1週安全点検（更新）
        nonSamplingCheck:
          type: object
          properties:
            disposalMeasures:
              type: string
              example: 全点検完了、異常なし