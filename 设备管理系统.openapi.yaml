openapi: 3.0.1
info:
  title: 设备管理系统
  description: ユーザー・ロール・権限の管理および関連付けを行うAPI
  version: 1.0.0
tags:
  - name: 用户管理
  - name: 用户管理/ユーザー管理
  - name: 用户管理/権限管理
  - name: 用户管理/ロール管理
  - name: 用户管理/ロール権限関連付け
  - name: 用户管理/ユーザーロール関連付け
  - name: 用户管理/ユーザー権限上書き
  - name: 设备信息
  - name: 设备信息/デバイス管理
  - name: 设备信息/デバイスIP管理
  - name: 设备信息/モニター管理
  - name: 设备权限
  - name: 设备权限/設備権限
  - name: 设备权限/権限IP
  - name: 设备权限/権限デバイス関連付け
  - name: 字典
  - name: 字典/辞書类型
  - name: 字典/辞書项
  - name: 安全点检
  - name: 安全点检/月次点検報告
  - name: 安全点检/抜き取り検査
  - name: 安全点检/非抜き取り検査
  - name: ユーザー管理
  - name: 権限管理
  - name: ロール管理
  - name: ロール権限関連付け
  - name: ユーザーロール関連付け
  - name: ユーザー権限上書き
  - name: デバイス管理
  - name: デバイスIP管理
  - name: モニター管理
  - name: 設備権限
  - name: 権限IP
  - name: 権限デバイス関連付け
  - name: 辞書类型
  - name: 辞書项
  - name: 月次点検報告
  - name: 抜き取り検査
  - name: 非抜き取り検査
paths:
  /users:
    get:
      summary: ユーザー一覧取得
      deprecated: false
      description: ユーザーの一覧をページングで取得します
      tags:
        - 用户管理/ユーザー管理
        - ユーザー管理
      parameters:
        - name: page
          in: query
          description: ページ番号（1から開始）
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: ページサイズ
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          description: ソートフィールド（例：createTime,desc）
          required: false
          schema:
            type: string
        - name: jobNumber
          in: query
          description: 社員番号で検索
          required: false
          example: EMP001
          schema:
            type: string
        - name: name
          in: query
          description: 氏名で検索（部分一致）
          required: false
          example: 张三
          schema:
            type: string
        - name: deptId
          in: query
          description: 部署番号でフィルター
          required: false
          example: DEPT001
          schema:
            type: string
        - name: userTypeId
          in: query
          description: ユーザータイプIDでフィルター
          required: false
          example: 1
          schema:
            type: integer
      responses:
        '200':
          description: ユーザー一覧の取得に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 認証トークンが無効または期限切れです
        '403':
          $ref: '#/components/responses/Forbidden'
          description: 操作に必要な権限がありません
      security:
        - BearerAuth: []
    post:
      summary: ユーザー新規作成
      deprecated: false
      description: 新しいユーザーアカウントを作成します
      tags:
        - 用户管理/ユーザー管理
        - ユーザー管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        '201':
          description: ユーザーの作成に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/UserResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータが不正です
        '409':
          description: 社員番号が既に存在します
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
  /users/{userId}:
    get:
      summary: ユーザー詳細取得
      deprecated: false
      description: 指定されたユーザーIDの詳細情報を取得します
      tags:
        - 用户管理/ユーザー管理
        - ユーザー管理
      parameters:
        - name: userId
          in: path
          description: ユーザーID
          required: true
          example: 1
          schema:
            type: integer
      responses:
        '200':
          description: ユーザー詳細の取得に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/UserDetailResponse'
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが見つかりません
      security:
        - BearerAuth: []
    put:
      summary: ユーザー情報更新
      deprecated: false
      description: 指定されたユーザーの情報を更新します
      tags:
        - 用户管理/ユーザー管理
        - ユーザー管理
      parameters:
        - name: userId
          in: path
          description: ユーザーID
          required: true
          example: 1
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      responses:
        '200':
          description: ユーザー情報の更新に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/UserResponse'
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが見つかりません
      security:
        - BearerAuth: []
    delete:
      summary: ユーザー削除
      deprecated: false
      description: 指定されたユーザーを論理削除します
      tags:
        - 用户管理/ユーザー管理
        - ユーザー管理
      parameters:
        - name: userId
          in: path
          description: ユーザーID
          required: true
          example: 1
          schema:
            type: integer
      responses:
        '204':
          description: ユーザーの削除に成功しました
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが見つかりません
      security:
        - BearerAuth: []
  /users/{userId}/password:
    put:
      summary: パスワード変更
      deprecated: false
      description: 指定されたユーザーのパスワードを変更します
      tags:
        - 用户管理/ユーザー管理
        - ユーザー管理
      parameters:
        - name: userId
          in: path
          description: ユーザーID
          required: true
          example: 1
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - newPassword
                - confirmPassword
              properties:
                newPassword:
                  type: string
                  description: 新しいパスワード
                  example: NewP@ssw0rd123
                confirmPassword:
                  type: string
                  description: 新しいパスワード（確認用）
                  example: NewP@ssw0rd123
        required: true
      responses:
        '200':
          description: パスワードの変更に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
      security:
        - BearerAuth: []
  /users/search:
    get:
      summary: ユーザー検索
      deprecated: false
      description: さまざまな条件でユーザーを検索します
      tags:
        - 用户管理/ユーザー管理
        - ユーザー管理
      parameters:
        - name: keyword
          in: query
          description: 検索キーワード（社員番号または氏名）
          required: false
          example: EMP001
          schema:
            type: string
        - name: deptId
          in: query
          description: 部署番号でフィルター
          required: false
          example: DEPT001
          schema:
            type: string
        - name: userTypeId
          in: query
          description: ユーザータイプIDでフィルター
          required: false
          example: 1
          schema:
            type: integer
        - name: limit
          in: query
          description: 取得件数制限
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: ユーザー検索の取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserSimpleResponse'
          headers: {}
      security:
        - BearerAuth: []
  /permissions:
    get:
      summary: 権限一覧取得
      deprecated: false
      description: システム権限の一覧を取得します
      tags:
        - 用户管理/権限管理
        - 権限管理
      parameters:
        - name: page
          in: query
          description: ページ番号（1から開始）
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: ページサイズ
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          description: ソートフィールド（例：createTime,desc）
          required: false
          schema:
            type: string
        - name: permissionCode
          in: query
          description: 権限コードで検索
          required: false
          example: PERM_VIEW_USER
          schema:
            type: string
        - name: permissionName
          in: query
          description: 権限名で検索（部分一致）
          required: false
          example: ユーザー参照
          schema:
            type: string
        - name: resourceType
          in: query
          description: リソースタイプでフィルター
          required: false
          example: メニュー
          schema:
            type: string
      responses:
        '200':
          description: 権限一覧の取得に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PermissionResponse'
          headers: {}
      security:
        - BearerAuth: []
    post:
      summary: 権限新規作成
      deprecated: false
      description: 新しいシステム権限を作成します
      tags:
        - 用户管理/権限管理
        - 権限管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermissionRequest'
        required: true
      responses:
        '201':
          description: 権限の作成に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/PermissionResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータが不正です
        '409':
          description: 権限コードが既に存在します
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
  /permissions/{permissionId}:
    get:
      summary: 権限詳細取得
      deprecated: false
      description: 指定された権限IDの詳細情報を取得します
      tags:
        - 用户管理/権限管理
        - 権限管理
      parameters:
        - name: permissionId
          in: path
          description: 権限ID
          required: true
          example: 1
          schema:
            type: integer
      responses:
        '200':
          description: 権限詳細の取得に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/PermissionDetailResponse'
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが見つかりません
      security:
        - BearerAuth: []
    put:
      summary: 権限情報更新
      deprecated: false
      description: 指定された権限の情報を更新します
      tags:
        - 用户管理/権限管理
        - 権限管理
      parameters:
        - name: permissionId
          in: path
          description: 権限ID
          required: true
          example: 1
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionRequest'
        required: true
      responses:
        '200':
          description: 権限情報の更新に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/PermissionResponse'
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが見つかりません
      security:
        - BearerAuth: []
    delete:
      summary: 権限削除
      deprecated: false
      description: 指定された権限を論理削除します
      tags:
        - 用户管理/権限管理
        - 権限管理
      parameters:
        - name: permissionId
          in: path
          description: 権限ID
          required: true
          example: 1
          schema:
            type: integer
      responses:
        '204':
          description: 権限の削除に成功しました
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが見つかりません
      security:
        - BearerAuth: []
  /permissions/tree:
    get:
      summary: 権限ツリー取得
      deprecated: false
      description: 階層構造の権限ツリーを取得します
      tags:
        - 用户管理/権限管理
        - 権限管理
      parameters: []
      responses:
        '200':
          description: 権限ツリーの取得に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PermissionTreeNode'
          headers: {}
      security:
        - BearerAuth: []
  /permissions/import:
    post:
      summary: 権限一括インポート
      deprecated: false
      description: 権限データを一括でインポートします
      tags:
        - 用户管理/権限管理
        - 権限管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - permissions
              properties:
                permissions:
                  type: array
                  items:
                    $ref: '#/components/schemas/CreatePermissionRequest'
        required: true
      responses:
        '200':
          description: 権限の一括インポートに成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
      security:
        - BearerAuth: []
  /permissions/statistics:
    get:
      summary: 権限統計情報取得
      deprecated: false
      description: 権限関連の統計情報を取得します
      tags:
        - 用户管理/権限管理
        - 権限管理
      parameters: []
      responses:
        '200':
          description: 権限統計情報の取得に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/PermissionStatisticsResponse'
          headers: {}
      security:
        - BearerAuth: []
  /roles:
    get:
      summary: ロール一覧取得
      deprecated: false
      description: システムロールの一覧を取得します
      tags:
        - 用户管理/ロール管理
        - ロール管理
      parameters:
        - name: page
          in: query
          description: ページ番号（1から開始）
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: ページサイズ
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          description: ソートフィールド（例：createTime,desc）
          required: false
          schema:
            type: string
        - name: roleCode
          in: query
          description: ロールコードで検索
          required: false
          example: ROLE_ADMIN
          schema:
            type: string
        - name: roleName
          in: query
          description: ロール名で検索（部分一致）
          required: false
          example: 管理者
          schema:
            type: string
      responses:
        '200':
          description: ロール一覧の取得に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoleResponse'
          headers: {}
      security:
        - BearerAuth: []
    post:
      summary: ロール新規作成
      deprecated: false
      description: 新しいシステムロールを作成します
      tags:
        - 用户管理/ロール管理
        - ロール管理
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
        required: true
      responses:
        '201':
          description: ロールの作成に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/RoleResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: リクエストパラメータが不正です
        '409':
          description: ロールコードが既に存在します
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
  /roles/{roleId}:
    get:
      summary: ロール詳細取得
      deprecated: false
      description: 指定されたロールIDの詳細情報を取得します
      tags:
        - 用户管理/ロール管理
        - ロール管理
      parameters:
        - name: roleId
          in: path
          description: ロールID
          required: true
          example: 1
          schema:
            type: integer
      responses:
        '200':
          description: ロール詳細の取得に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/RoleDetailResponse'
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが見つかりません
      security:
        - BearerAuth: []
    put:
      summary: ロール情報更新
      deprecated: false
      description: 指定されたロールの情報を更新します
      tags:
        - 用户管理/ロール管理
        - ロール管理
      parameters:
        - name: roleId
          in: path
          description: ロールID
          required: true
          example: 1
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
        required: true
      responses:
        '200':
          description: ロール情報の更新に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    $ref: '#/components/schemas/RoleResponse'
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが見つかりません
      security:
        - BearerAuth: []
    delete:
      summary: ロール削除
      deprecated: false
      description: 指定されたロールを論理削除します
      tags:
        - 用户管理/ロール管理
        - ロール管理
      parameters:
        - name: roleId
          in: path
          description: ロールID
          required: true
          example: 1
          schema:
            type: integer
      responses:
        '204':
          description: ロールの削除に成功しました
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: リソースが見つかりません
      security:
        - BearerAuth: []
  /roles/{roleId}/permissions:
    get:
      summary: ロール権限一覧取得
      deprecated: false
      description: 指定されたロールに割り当てられた権限一覧を取得します
      tags:
        - 用户管理/ロール権限関連付け
        - ロール権限関連付け
      parameters:
        - name: roleId
          in: path
          description: ロールID
          required: true
          example: 1
          schema:
            type: integer
      responses:
        '200':
          description: ロール権限一覧の取得に成功しました
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PermissionResponse'
          headers: {}
      security:
        - BearerAuth: []
    post:
      summary: ロール権限割り当て
      deprecated: false
      description: ロールに権限を割り当てます
      tags:
        - 用户管理/ロール権限関連付け
        - ロール権限関連付け
      parameters:
        - name: roleId
          in: path
          description: ロールID
          required: true
          example: 1
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - permissionIds
              properties:
                permissionIds:
                  type: array
                  items:
                    type: integer
                  description: 割り当てる権限IDのリスト
                  example:
                    - 1
                    - 2
                    - 3
        required: true
      responses:
        '200':
          description: ロール権限の割り当てに成功しました
          content:
