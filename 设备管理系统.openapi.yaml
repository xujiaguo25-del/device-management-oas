components:
  schemas:
    ApiResponse: &ref_0
      type: object
      properties:
        code:
          type: integer
          description: レスポンスコード（200=成功）
          example: 200
        message:
          type: string
          description: レスポンスメッセージ
          example: 成功
        data:
          type: object
          description: レスポンスデータ
          properties: {}
        timestamp:
          type: string
          format: date-time
          description: レスポンス時刻
          example: '2025-12-30T01:23:45.678Z'
    PageResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            pageInfo:
              type: object
              properties:
                page:
                  type: integer
                  description: 現在のページ番号
                  example: 1
                size:
                  type: integer
                  description: ページサイズ
                  example: 20
                total:
                  type: integer
                  description: 総レコード数
                  example: 100
                pages:
                  type: integer
                  description: 総ページ数
                  example: 5
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: エラーコード
          example: 401
        message:
          type: string
          description: エラーメッセージ
          example: 認証に失敗しました
        error:
          type: string
          description: エラータイプ
          example: UNAUTHORIZED
        path:
          type: string
          description: リクエストパス
          example: /api/v1/users
        timestamp:
          type: string
          format: date-time
          description: エラー発生時刻
          example: '2025-12-30T01:23:45.678Z'
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: フィールド名
              message:
                type: string
                description: フィールドエラーメッセージ
    CreateUserRequest:
      type: object
      required:
        - deptId
        - name
        - jobNumber
        - password
      properties:
